openapi: 3.0.3
info:
  title: Steward API
  version: "1.0.0"
  description: |
    Steward is a minimal, on-node lifecycle supervisor for agent instances. This
    document is the authoritative public contract for its HTTP API. If the running
    server and this document disagree, this document is the specification.

    By default state is held in memory only and restarting the process forgets
    all tracked instances. An operator may opt into durable state (the server's
    `-state-file` flag), which persists state across restarts. The
    `durable_state` field of `GET /v1/capabilities` reports whether persistence is
    enabled without exposing the path. `GET /v1/readiness` also checks whether the
    state-file directory remains writable and returns 503 with `check=state_file`
    when durable mutations cannot be recorded. Persistence does not change an
    instance request or success-response shape.

    `GET /metrics` is likewise opt-in (the server's `-enable-metrics` flag) and
    off by default; unlike every other operation here its response is
    `text/plain` (Prometheus text exposition format), not `application/json`.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Steward
    url: https://github.com/hardrails/steward
servers:
  - url: http://127.0.0.1:8080
    description: Local development default
tags:
  - name: instances
    description: Agent-instance lifecycle operations.
  - name: capabilities
    description: Capabilities advertised by this Steward.
  - name: health
    description: Liveness/readiness probes.
  - name: metrics
    description: Opt-in Prometheus-format operational metrics.
paths:
  /v1/instances:
    get:
      tags: [instances]
      operationId: listInstances
      summary: List tracked instances
      description: |
        Returns every instance this Steward currently tracks, sorted by
        `runtime_ref` for a deterministic order. The list is wrapped in an object
        under `instances` (never a bare top-level array) so future sibling fields
        stay additive. A destroyed instance is no longer tracked and does not
        appear; an empty tracker returns an empty `instances` array.

        Three optional query-string filters narrow the result and compose via
        AND when combined: `status`, `instance_id_prefix`, and
        `created_since`. Omitting all three is byte-for-byte the same
        unfiltered response this endpoint always returned.
      parameters:
        - $ref: "#/components/parameters/StatusFilter"
        - $ref: "#/components/parameters/InstanceIDPrefixFilter"
        - $ref: "#/components/parameters/CreatedSinceFilter"
      responses:
        "200":
          description: The currently tracked instances matching every given filter.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceList"
        "400":
          description: "`status` was not a recognized value, or `created_since` was not a parseable RFC3339 timestamp."
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [instances]
      operationId: provisionInstance
      summary: Provision an instance
      description: |
        Provision a new agent instance. Idempotent on `instance_id`: if an
        instance with the given `instance_id` is already tracked, the existing
        instance is returned (HTTP 200) instead of creating a new one. A newly
        created instance is returned with HTTP 201.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionRequest"
      responses:
        "201":
          description: A new instance was created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "200":
          description: An instance with this `instance_id` already existed and was returned unchanged.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/CapacityExceeded"
  /v1/instances/batch:
    post:
      tags: [instances]
      operationId: batchInstanceOperations
      summary: Execute an ordered batch of lifecycle operations
      description: |
        Executes an ordered list of lifecycle operations — `provision`,
        `start`, `stop`, `destroy` — against the tracker, one at a time, in
        exactly the order given, and returns one result per operation at the
        same index in `results`.

        **This is deliberately not a transaction.** Operations are not rolled
        back on a later failure, and an earlier operation's effect is visible
        to a later one in the same batch — for example, a batch that destroys
        an `instance_id` and then re-provisions it works, because by the time
        the second operation runs, the first has already released the
        `instance_id`. A failure in one operation never blocks the rest of
        the batch: if operation 3 of 5 fails, 1, 2, 4, and 5 still execute.
        Partial success is always visible per-operation in `results` — never
        silently swallowed — and the overall HTTP response is `200` as long
        as the request body itself was well-formed; each operation's own
        outcome (success or failure) lives in that operation's own
        `status`/`instance`/`error` fields, not in the response's HTTP status.

        Each operation is executed through the exact same tracker call its
        single-instance endpoint uses (`POST /v1/instances` for `"provision"`,
        `POST /v1/instances/{id}/start` for `"start"`, and so on), so it keeps
        that endpoint's own idempotency behavior. In particular, `"provision"`
        stays idempotent on `instance_id` — retrying an entire batch (for
        example after a client-side timeout left the outcome ambiguous) does
        not double-provision. `"destroy"` is **not** idempotent across a
        retry: it releases the `runtime_ref`, so replaying a batch that
        already destroyed an instance gets a `404 unknown_runtime_ref` on
        that operation the second time — the same outcome a repeated
        `DELETE /v1/instances/{id}` would give.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: |
            The batch was executed; every operation was attempted in order.
            Check each entry of `results` for its own outcome — a `200` here
            does not imply every operation succeeded.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "400":
          description: The request body was malformed, was not a JSON object with an `operations` array, or contained more than 256 operations.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/instances/{id}:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    get:
      tags: [instances]
      operationId: getInstance
      summary: Get instance status
      description: Returns the current tracked state for one `runtime_ref`.
      responses:
        "200":
          description: The current state of the instance.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [instances]
      operationId: destroyInstance
      summary: Destroy an instance
      description: Destroys the instance and stops tracking it. The returned body reflects the terminal `DESTROYED` status.
      responses:
        "200":
          description: The destroyed instance.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/instances/{id}/start:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [instances]
      operationId: startInstance
      summary: Start an instance
      description: |
        Starts the instance (`PENDING`/`STOPPED`/`HIBERNATED` → `RUNNING`).
        Starting an already-`RUNNING` instance is an idempotent no-op (`200`) and
        never spawns a duplicate process.

        When process execution is enabled and the instance's spec carries a
        `command`, this spawns a real OS process (or, from `HIBERNATED`, resumes the
        suspended one via SIGCONT). If the process cannot be spawned (executable not
        found, permission denied, missing `working_dir`), the call fails with `400
        process_start_failed` and the instance is left in its prior status — never
        falsely reported `RUNNING`.
      responses:
        "200":
          description: The updated instance (`RUNNING`).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/instances/{id}/stop:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [instances]
      operationId: stopInstance
      summary: Stop an instance
      description: |
        Stops the instance (`RUNNING`/`HIBERNATED`/`STOPPED` → `STOPPED`).
        Stopping an already-`STOPPED` instance is an idempotent no-op (`200`).
        Stopping a `PENDING` instance — one that has never started — is rejected
        with `409 invalid_state_transition` rather than silently recording a
        nonsensical `STOPPED`. Process-backed stop releases the tracker lock while
        waiting for termination. If a concurrent start creates a newer process in
        that interval, stop returns that newer `RUNNING` state instead of orphaning
        it or falsely reporting it stopped.
      responses:
        "200":
          description: The updated instance, normally `STOPPED`; it can be `RUNNING` when a concurrent start superseded a process-backed stop.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/InvalidStateTransition"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/instances/{id}/hibernate:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [instances]
      operationId: hibernateInstance
      summary: Hibernate an instance
      description: |
        Hibernates the instance (`RUNNING`/`STOPPED`/`HIBERNATED` →
        `HIBERNATED`). Hibernating an already-`HIBERNATED` instance is an
        idempotent no-op (`200`). Hibernating a `PENDING` instance — one that has
        never started — is rejected with `409 invalid_state_transition`.
      responses:
        "200":
          description: The updated instance (`HIBERNATED`).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/InvalidStateTransition"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/capabilities:
    get:
      tags: [capabilities]
      operationId: getCapabilities
      summary: List advertised capabilities
      description: |
        Returns the capabilities this Steward advertises plus a small slice of
        operational state useful to a control-plane dashboard: the current tracked
        `instance_count`, the configured `max_instances` cap, whether durable state
        is enabled (`durable_state`, a boolean — never the file path), and the
        Steward `version`.

        `skills` is always an empty array in v1; its shape is reserved for a future
        optional computer-use worker capability that will register itself here. The
        operational fields are additive to that v1 shape.
      responses:
        "200":
          description: The advertised capabilities.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/healthz:
    get:
      tags: [health]
      operationId: getHealthz
      summary: Liveness probe
      description: |
        A liveness probe. A `200` with `{"status":"ok"}` confirms the process is up
        and the HTTP server is serving requests.

        This is deliberately liveness only: it does not probe the durable-state
        file even when `-state-file` is configured. Durable state is fail-closed at
        startup: an unreadable or corrupt file aborts boot. Mutation persistence
        failures return an error and roll back where the external effect is still
        reversible. A process that has already stopped cannot be resurrected; in
        that case memory records `STOPPED` while the state file may lag. Readiness,
        rather than this hot liveness path, checks whether the state directory
        remains writable.
      responses:
        "200":
          description: The process is up and serving.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/readiness:
    get:
      tags: [health]
      operationId: getReadiness
      summary: Readiness probe
      description: |
        A rolling-deployment readiness gate, distinct from the `/v1/healthz`
        liveness probe. Returns `200 {"status":"ready"}` only when the instance
        is ready to receive traffic; `503` (with a body naming the failing
        check) when it is not yet ready or is degraded, so a load balancer or
        orchestrator drains a not-yet-warm or persistently-failing instance
        rather than routing to it.

        The gates, checked cheapest-first, first failure wins:
          - the instance tracker is initialized;
          - when the outbound uplink is enabled, its command queue has not been
            full for several consecutive poll cycles — a node not keeping up with
            its command backlog is drained until it catches up, while a single
            momentary over-full poll does not flip readiness;
          - when the outbound uplink is enabled (`-uplink-url`), it has completed
            at least one successful poll OR is not in a persistent-failure state
            (a rejected credential, or sustained polling failure with no success
            yet) — a brief transient blip does not flip readiness;
          - when durable state is enabled (`-state-file`), its directory is
            writable — the capability persistence needs. Unlike the liveness
            probe, readiness deliberately performs this filesystem check, since a
            state directory gone read-only or full means the process is alive but
            can no longer durably record a mutation.

        Like `/v1/healthz`, it exists only on the inbound listener: a
        `-disable-inbound-listener` (uplink-only) node has no local readiness
        endpoint — its readiness signal is its advancing uplink poll logs.
      responses:
        "200":
          description: The instance is ready to receive traffic.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "503":
          description: |
            The instance is not ready or is degraded. The body's `check` names
            the first failing gate and `detail` explains why.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /metrics:
    get:
      tags: [metrics]
      operationId: getMetrics
      summary: Operational metrics (opt-in)
      description: |
        Renders Steward's operational state in the [Prometheus text exposition
        format](https://github.com/prometheus/docs/blob/main/content/docs/instrumenting/exposition_formats.md):
        the current tracked instance count (broken down by status), the configured
        `max_instances` cap, and — only when the outbound uplink is enabled
        (`-uplink-url`) — its poll latency (min/max/last), poll count, command
        success/failure counters, current backoff, and command-queue backpressure
        (current and maximum queue depth, plus a counter of commands rejected because
        the queue was full and left for the control plane to redeliver).

        This endpoint is **off by default**: it exists only when the server's
        `-enable-metrics` flag (or `STEWARD_ENABLE_METRICS`) is set. When disabled
        (the default), `GET /metrics` is not a registered route and behaves like any
        other unknown path — a `404` with the standard `Error` JSON shape, not a
        special case. When enabled, it is reachable only through the same inbound
        HTTP listener every other operation in this document uses: there is no
        second listener, so it is absent whenever the server's
        `-disable-inbound-listener` flag leaves no listener bound at all, and it is
        subject to the same per-source rate limit as every other operation below.
      responses:
        "200":
          description: |
            Operational metrics in Prometheus text exposition format. Unlike every
            other response in this document, the body is `text/plain`, not
            `application/json` — the standard content type a Prometheus scraper
            expects.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP steward_instances Current number of tracked instances, by status.
                # TYPE steward_instances gauge
                steward_instances{status="RUNNING"} 3
                # HELP steward_max_instances Configured instance capacity cap (Provision returns 503 beyond it).
                # TYPE steward_max_instances gauge
                steward_max_instances 1024
        "404":
          description: |
            `/metrics` is not registered: the server was started without
            `-enable-metrics`. Identical in shape to the 404 any other unknown path
            returns.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  headers:
    RequestId:
      description: |
        A per-request correlation id, unique per request and emitted on the
        matching server-side log line, so a client or control plane can tie a
        response to the exact node-side log entry that produced it. Present on
        every response. It is a logging/correlation aid, not a trace-context
        header: the server always mints a fresh value and never propagates a
        client-supplied one.
      schema:
        type: string
        example: 9f8e7d6c5b4a3210
    RetryAfter:
      description: |
        The number of seconds to wait before retrying, sent on a `429` when the
        per-source inbound rate limit is exceeded. A positive integer
        (delta-seconds), always at least 1.
      schema:
        type: integer
        minimum: 1
        example: 1
  parameters:
    RuntimeRef:
      name: id
      in: path
      required: true
      description: The opaque `runtime_ref` returned when the instance was provisioned.
      schema:
        type: string
    StatusFilter:
      name: status
      in: query
      required: false
      description: |
        Keep only instances whose `status` is exactly this value (an exact
        match against the `Status` enum — no case-folding). Omitted means no
        status filtering. An unrecognized value is a `400`, never a
        silently-empty result. A destroyed instance is never tracked in the
        first place (`destroyInstance` removes it), so `status=DESTROYED`
        always matches nothing.
      schema:
        $ref: "#/components/schemas/Status"
    InstanceIDPrefixFilter:
      name: instance_id_prefix
      in: query
      required: false
      description: |
        Keep only instances whose `instance_id` has this as a plain
        string prefix. Omitted means no prefix filtering.
      schema:
        type: string
    CreatedSinceFilter:
      name: created_since
      in: query
      required: false
      description: |
        Keep only instances created at or after this instant (inclusive). Must
        be an RFC3339 timestamp; an unparseable value is a `400`, never a
        silently-ignored filter. Omitted means no created_since filtering.
      schema:
        type: string
        format: date-time
        example: "2026-07-01T00:00:00Z"
  responses:
    BadRequest:
      description: |
        The request was rejected as a client error (400). See the `error` code for the
        class: a malformed body/field or bad query filter (`invalid_request`); a
        malformed `spec` (`invalid_spec`); a `command`-bearing spec while process
        execution is disabled (`process_exec_disabled`); or a start whose configured
        process could not be spawned (`process_start_failed`).
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnknownRuntimeRef:
      description: No instance is tracked for the given `runtime_ref`.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MethodNotAllowed:
      description: The HTTP method is not allowed on this path.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: The request body exceeded the 1 MiB limit.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    CapacityExceeded:
      description: The tracker has reached its maximum number of instances; retry later.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InvalidStateTransition:
      description: |
        The requested lifecycle operation is not valid for the instance's
        current status — for example, stopping or hibernating an instance that
        is still `PENDING` (never started). The instance is left unchanged (no
        silent mutation into a nonsensical state); the `message` names the
        refused transition. A self-transition (e.g. starting an already-`RUNNING`
        instance) is NOT rejected — it is an idempotent no-op returning `200`.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: |
        Too many requests from this source address. Steward applies a per-source
        (client IP) request-rate limit to its unauthenticated inbound listener, in
        the same defensive class as the request-body and instance-count caps. It is
        an operator-tunable server-side deployment control (the server's
        `-max-requests-per-second` flag, default 20 requests/second per source with a
        burst of twice that; 0 disables it) and applies uniformly to every operation
        below — it changes no request or response body shape.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: An unexpected internal error occurred.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Status:
      type: string
      description: |
        Lifecycle status. These names mirror the control plane's own state
        machine and are kept in sync by convention.
      enum:
        - PENDING
        - RUNNING
        - STOPPED
        - HIBERNATED
        - DESTROYED
        - FAILED
    Instance:
      type: object
      required:
        - instance_id
        - runtime_ref
        - status
        - created_at
      properties:
        instance_id:
          type: string
          description: Caller-supplied identifier; the idempotency key for provisioning.
        runtime_ref:
          type: string
          description: Opaque handle assigned by Steward; used to address the instance on all other routes.
        status:
          $ref: "#/components/schemas/Status"
        created_at:
          type: string
          format: date-time
          description: |
            When this instance was first created by `provisionInstance`. Set
            once and never changed again, including across an idempotent
            re-provision of the same still-live `instance_id` (which returns
            the original `created_at` unchanged, not a fresh one). This is the
            field `created_since` on `listInstances` filters against.
        generation:
          type: integer
          format: int64
          minimum: 1
          description: |
            Control-plane lineage generation adopted from an outbound uplink
            command. Present only when generation fencing is in use; omitted
            for instances provisioned through the direct REST API.
        spec:
          $ref: "#/components/schemas/Spec"
        pid:
          type: integer
          description: |
            OS process id of the currently supervised process, when process
            execution is enabled (`-enable-process-exec`) and this instance has a
            running `command`-bearing spec. Omitted (or 0) otherwise. It is persisted
            so a best-effort liveness check can run after a Steward restart.
        last_exit_code:
          type: integer
          description: |
            Exit code of this instance's most recent supervised-process exit, when
            known. A clean exit is 0; a process terminated by a signal (e.g. the
            SIGKILL escalation) reports -1. Omitted when the instance never ran a
            process or its exit code is unknown (a reattached orphan, or lost
            supervision across a restart).
        proc_start_token:
          type: string
          description: |
            Operating-system start-time witness for `pid`, used to detect PID
            reuse before Steward reattaches to a process after restart. Present
            only for a supervised process when the witness was available. It is
            an opaque identity value, not a credential or wall-clock timestamp.
        last_exit_reason:
          type: string
          description: |
            Why the most recent supervised process is no longer running. Because
            `status` cannot itself distinguish an unexpected exit from a requested
            stop (both are `STOPPED` — Steward never emits `FAILED`), this field
            records the distinction. Omitted when no process has exited.
          enum:
            - stopped          # exited within the grace period after SIGTERM (a graceful, requested stop)
            - killed           # survived the grace period and was SIGKILLed (a forced, requested stop)
            - crashed          # exited on its own, unrequested (a crash); status is STOPPED, not FAILED
            - supervision_lost # its pid was gone when Steward reloaded durable state after a restart
    InstanceList:
      type: object
      required:
        - instances
      properties:
        instances:
          type: array
          description: |
            Every currently tracked instance, sorted by `runtime_ref`. Empty when
            nothing is tracked; never null.
          items:
            $ref: "#/components/schemas/Instance"
    Spec:
      type: object
      additionalProperties: true
      description: |
        Opaque, forwards-compatible instance configuration, round-tripped verbatim.
        Must be a JSON object; a non-object value is rejected with 400. An omitted or
        null `spec` is accepted and stored as absent. `additionalProperties: true`:
        the control plane may add fields without a Steward release, and Steward does
        not otherwise parse or interpret the contents.

        The named fields below are interpreted ONLY when process execution is enabled
        on the server (`-enable-process-exec`). When it is enabled, the PRESENCE of a
        `command` field is what turns an instance into a supervised OS process:
        starting it spawns the process, stopping it sends SIGTERM then SIGKILL,
        hibernating it sends SIGSTOP, and starting again sends SIGCONT. When process
        execution is DISABLED (the default), a spec containing a `command` field is
        rejected at provision time with 400 `process_exec_disabled` — the intent is
        never silently ignored — while a spec WITHOUT a `command` field behaves
        exactly as it always has: opaque config, no process. Steward NEVER runs the
        command through a shell, so shell metacharacters in `args` cannot cause
        injection; the child does NOT inherit Steward's environment (only `PATH` plus
        `env`); and there is no sandboxing or resource limiting (see ARCHITECTURE.md).
      properties:
        command:
          type: string
          description: |
            Executable to run (an absolute path, or a name resolved against Steward's
            PATH). Its presence is what triggers real process supervision. Run
            directly, never via a shell.
        args:
          type: array
          items:
            type: string
          description: Command-line arguments, passed verbatim (no shell expansion).
        env:
          type: object
          additionalProperties:
            type: string
          description: |
            Environment variables for the child process, as a name→value map. The
            child does NOT inherit Steward's own environment (which may hold secrets);
            its environment is a minimal base of only `PATH` (copied from Steward) plus
            these entries, which take precedence.
        working_dir:
          type: string
          description: Working directory for the child process; omitted inherits Steward's.
    ProvisionRequest:
      type: object
      required:
        - instance_id
      properties:
        instance_id:
          type: string
          description: Caller-supplied identifier. Provisioning is idempotent on this value.
        spec:
          $ref: "#/components/schemas/Spec"
    BatchOperationKind:
      type: string
      description: Which lifecycle verb a `BatchOperation` requests. Recognized values are `provision`, `start`, `stop`, and `destroy`; any other string produces a per-operation 400 result while the batch continues.
    BatchOperation:
      type: object
      required:
        - op
      description: |
        One entry in `BatchRequest.operations`. `op` selects which lifecycle
        verb to run and which of the remaining fields apply, mirroring the
        field each single-instance endpoint already accepts for that verb:
        `"provision"` mirrors `ProvisionRequest` (`instance_id` required,
        `spec` optional; `runtime_ref` is ignored); `"start"`, `"stop"`, and
        `"destroy"` mirror the single-instance routes, which address an
        instance by `runtime_ref` (`runtime_ref` required; `instance_id` and
        `spec` are ignored).
      properties:
        op:
          $ref: "#/components/schemas/BatchOperationKind"
        instance_id:
          type: string
          description: Required when `op` is `"provision"`; ignored otherwise.
        runtime_ref:
          type: string
          description: Required when `op` is `"start"`, `"stop"`, or `"destroy"`; ignored otherwise.
        spec:
          allOf:
            - $ref: "#/components/schemas/Spec"
          description: Optional; only used when `op` is `"provision"`. Same shape and validation as `ProvisionRequest.spec`.
    BatchRequest:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          maxItems: 256
          description: |
            An ordered list of operations, executed one at a time in exactly
            this order. At most 256 operations are accepted. An empty array
            is valid and yields an empty `results`.
          items:
            $ref: "#/components/schemas/BatchOperation"
    BatchOperationResult:
      type: object
      required:
        - op
        - status
      description: |
        One entry of `BatchResponse.results`, positionally aligned with the
        `BatchRequest.operations` entry that produced it. Exactly one of
        `instance` or `error` is set: `instance` is the same body a
        successful single-op call would return, and `error` is the same body
        a failed single-op call would return, with `status` set to that
        call's HTTP status code. `instance_id`/`runtime_ref` echo whichever
        identifier the request operation carried, so a result is
        self-describing without cross-referencing the original request by
        index.
      properties:
        op:
          type: string
          description: The `op` of the corresponding request operation (echoed even when it was not a recognized value).
        instance_id:
          type: string
        runtime_ref:
          type: string
        status:
          type: integer
          description: The HTTP status code this operation would have returned as a single-instance call.
        instance:
          $ref: "#/components/schemas/Instance"
        error:
          $ref: "#/components/schemas/Error"
    BatchResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          description: |
            One entry per input operation, in the same order. Produced by
            executing every operation in that order against the live tracker
            and continuing regardless of any individual operation's outcome —
            this is NOT an all-or-nothing transaction. Never null: an empty
            `operations` list yields an empty `results` array.
          items:
            $ref: "#/components/schemas/BatchOperationResult"
    Capabilities:
      type: object
      required:
        - skills
        - version
        - instance_count
        - max_instances
        - durable_state
      properties:
        skills:
          type: array
          description: Reserved for future capability descriptors; always empty in v1.
          items:
            type: object
            additionalProperties: true
        version:
          type: string
          description: The Steward build/version string.
        instance_count:
          type: integer
          minimum: 0
          description: Number of instances currently tracked.
        max_instances:
          type: integer
          minimum: 1
          description: Configured capacity cap; `provisionInstance` returns 503 beyond it.
        durable_state:
          type: boolean
          description: |
            Whether durable state is enabled (the server's `-state-file` flag). A
            boolean only — the configured file path is never exposed.
    Health:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Liveness marker; `ok` when the process is up and serving.
          example: ok
    Readiness:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: |
            `ready` (HTTP 200) when the instance may receive traffic;
            `not_ready` (HTTP 503) when it is not yet ready or is degraded.
          enum:
            - ready
            - not_ready
        check:
          type: string
          description: |
            On a `not_ready` response, the first readiness gate that failed.
            Omitted on a ready response.
          enum:
            - uplink
            - state_file
            - tracker
        detail:
          type: string
          description: On a `not_ready` response, a human-readable explanation. Omitted on a ready response.
    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: |
            Stable machine-readable error code naming the failure class — one of
            a small, closed taxonomy. Branch on this (or, more portably, on the
            HTTP status it travels with) rather than on `message`, which is
            human-facing prose that may change.
          enum:
            - invalid_request          # 400: malformed request body, missing/empty required field, unknown batch op, or unparseable query filter
            - invalid_spec             # 400: a present `spec` is malformed — not a JSON object, or a command-bearing spec with wrong-typed process fields
            - process_exec_disabled    # 400: spec has a `command` field but process execution is disabled (-enable-process-exec is off)
            - process_start_failed     # 400: a valid start could not spawn the configured process (executable not found, permission denied, missing working_dir)
            - unknown_runtime_ref      # 404: no instance is tracked for the addressed runtime_ref (including one already destroyed)
            - invalid_state_transition # 409: a Start/Stop/Hibernate whose target status is not reachable from the current status (e.g. stopping a PENDING instance)
            - capacity_exceeded        # 503: a new provision would exceed the configured max_instances cap
            - request_too_large        # 413: the request body exceeded the 1 MiB cap
            - rate_limited             # 429: the per-source inbound rate limit was exceeded
            - not_found                # 404: no route matches the path
            - method_not_allowed       # 405: the method is not allowed on the path
            - internal_error           # 500: an unexpected server-side error
        message:
          type: string
          description: Human-readable explanation.
