openapi: 3.0.3
info:
  title: Steward API
  version: "1.0.0"
  description: |
    Steward is a minimal, on-node lifecycle supervisor for agent instances. This
    document is the authoritative public contract for its HTTP API. If the running
    server and this document disagree, this document is the specification.

    By default state is held in memory only and restarting the process forgets
    all tracked instances. An operator may opt into durable state (the server's
    `-state-file` flag), which persists state across restarts. Persistence is a
    server-side deployment concern: the only place this HTTP contract reflects it
    is the boolean `durable_state` field of `GET /v1/capabilities`, which reports
    *whether* persistence is enabled (never the file path). It otherwise changes
    no instance request or response shape or status code below.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Steward
    url: https://github.com/hardrails/steward
servers:
  - url: http://127.0.0.1:8080
    description: Local development default
tags:
  - name: instances
    description: Agent-instance lifecycle operations.
  - name: capabilities
    description: Capabilities advertised by this Steward.
  - name: health
    description: Liveness/readiness probes.
paths:
  /v1/instances:
    get:
      tags: [instances]
      operationId: listInstances
      summary: List tracked instances
      description: |
        Returns every instance this Steward currently tracks, sorted by
        `runtime_ref` for a deterministic order. The list is wrapped in an object
        under `instances` (never a bare top-level array) so future sibling fields
        stay additive. A destroyed instance is no longer tracked and does not
        appear; an empty tracker returns an empty `instances` array.
      responses:
        "200":
          description: The currently tracked instances.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceList"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [instances]
      operationId: provisionInstance
      summary: Provision an instance
      description: |
        Provision a new agent instance. Idempotent on `instance_id`: if an
        instance with the given `instance_id` is already tracked, the existing
        instance is returned (HTTP 200) instead of creating a new one. A newly
        created instance is returned with HTTP 201.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionRequest"
      responses:
        "201":
          description: A new instance was created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "200":
          description: An instance with this `instance_id` already existed and was returned unchanged.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/CapacityExceeded"
  /v1/instances/{id}:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    get:
      tags: [instances]
      operationId: getInstance
      summary: Get instance status
      responses:
        "200":
          description: The current state of the instance.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [instances]
      operationId: destroyInstance
      summary: Destroy an instance
      description: Destroys the instance and stops tracking it. The returned body reflects the terminal `DESTROYED` status.
      responses:
        "200":
          description: The destroyed instance.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/instances/{id}/start:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [instances]
      operationId: startInstance
      summary: Start an instance
      responses:
        "200":
          description: The updated instance (`RUNNING`).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/instances/{id}/stop:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [instances]
      operationId: stopInstance
      summary: Stop an instance
      responses:
        "200":
          description: The updated instance (`STOPPED`).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/instances/{id}/hibernate:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [instances]
      operationId: hibernateInstance
      summary: Hibernate an instance
      responses:
        "200":
          description: The updated instance (`HIBERNATED`).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/UnknownRuntimeRef"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/capabilities:
    get:
      tags: [capabilities]
      operationId: getCapabilities
      summary: List advertised capabilities
      description: |
        Returns the capabilities this Steward advertises plus a small slice of
        operational state useful to a control-plane dashboard: the current tracked
        `instance_count`, the configured `max_instances` cap, whether durable state
        is enabled (`durable_state`, a boolean — never the file path), and the
        Steward `version`.

        `skills` is always an empty array in v1; its shape is reserved for a future
        optional computer-use worker capability that will register itself here. The
        operational fields are additive to that v1 shape.
      responses:
        "200":
          description: The advertised capabilities.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/healthz:
    get:
      tags: [health]
      operationId: getHealthz
      summary: Liveness probe
      description: |
        A liveness probe. A `200` with `{"status":"ok"}` confirms the process is up
        and the HTTP server is serving requests.

        This is deliberately liveness only: it does not probe the durable-state
        file even when `-state-file` is configured. Durable state is already
        fail-closed at startup (an unreadable or corrupt file aborts boot) and on
        every mutation (a failed persist rolls back and returns an error), so a
        broken state file surfaces there — not as a healthy probe masking a doomed
        node — and re-probing it here on a hot, frequently-polled path would add
        cost without adding a guarantee.
      responses:
        "200":
          description: The process is up and serving.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  headers:
    RequestId:
      description: |
        A per-request correlation id, unique per request and emitted on the
        matching server-side log line, so a client or control plane can tie a
        response to the exact node-side log entry that produced it. Present on
        every response. It is a logging/correlation aid, not a trace-context
        header: the server always mints a fresh value and never propagates a
        client-supplied one.
      schema:
        type: string
        example: 9f8e7d6c5b4a3210
  parameters:
    RuntimeRef:
      name: id
      in: path
      required: true
      description: The opaque `runtime_ref` returned when the instance was provisioned.
      schema:
        type: string
  responses:
    BadRequest:
      description: The request body was malformed, `instance_id` was missing, or `spec` was not a JSON object.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnknownRuntimeRef:
      description: No instance is tracked for the given `runtime_ref`.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MethodNotAllowed:
      description: The HTTP method is not allowed on this path.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: The request body exceeded the 1 MiB limit.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    CapacityExceeded:
      description: The tracker has reached its maximum number of instances; retry later.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: An unexpected internal error occurred.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Status:
      type: string
      description: |
        Lifecycle status. These names mirror the control plane's own state
        machine and are kept in sync by convention.
      enum:
        - PENDING
        - RUNNING
        - STOPPED
        - HIBERNATED
        - DESTROYED
        - FAILED
    Instance:
      type: object
      required:
        - instance_id
        - runtime_ref
        - status
      properties:
        instance_id:
          type: string
          description: Caller-supplied identifier; the idempotency key for provisioning.
        runtime_ref:
          type: string
          description: Opaque handle assigned by Steward; used to address the instance on all other routes.
        status:
          $ref: "#/components/schemas/Status"
        spec:
          type: object
          additionalProperties: true
          description: |
            Opaque, forwards-compatible configuration supplied at provision time.
            Must be a JSON object; its contents are stored and echoed verbatim and
            are never otherwise parsed or interpreted.
    InstanceList:
      type: object
      required:
        - instances
      properties:
        instances:
          type: array
          description: |
            Every currently tracked instance, sorted by `runtime_ref`. Empty when
            nothing is tracked; never null.
          items:
            $ref: "#/components/schemas/Instance"
    ProvisionRequest:
      type: object
      required:
        - instance_id
      properties:
        instance_id:
          type: string
          description: Caller-supplied identifier. Provisioning is idempotent on this value.
        spec:
          type: object
          additionalProperties: true
          description: |
            Opaque, forwards-compatible configuration, round-tripped verbatim. Must
            be a JSON object; a non-object value is rejected with 400. An omitted or
            null `spec` is accepted and stored as absent.
    Capabilities:
      type: object
      required:
        - skills
        - version
        - instance_count
        - max_instances
        - durable_state
      properties:
        skills:
          type: array
          description: Reserved for future capability descriptors; always empty in v1.
          items:
            type: object
            additionalProperties: true
        version:
          type: string
          description: The Steward build/version string.
        instance_count:
          type: integer
          minimum: 0
          description: Number of instances currently tracked.
        max_instances:
          type: integer
          minimum: 1
          description: Configured capacity cap; `provisionInstance` returns 503 beyond it.
        durable_state:
          type: boolean
          description: |
            Whether durable state is enabled (the server's `-state-file` flag). A
            boolean only — the configured file path is never exposed.
    Health:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Liveness marker; `ok` when the process is up and serving.
          example: ok
    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Stable machine-readable error code (for example, `unknown_runtime_ref`).
        message:
          type: string
          description: Human-readable explanation.
