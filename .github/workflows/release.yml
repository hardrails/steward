name: Release

# Publishes cross-platform binaries and a SHA-256 checksums file to a GitHub
# Release when a version tag (vX.Y.Z) is pushed. A manual workflow_dispatch runs
# the identical build + checksum + version-assertion path but publishes NOTHING:
# the artifacts are uploaded to the workflow run only, so the release automation
# can be dry-fired safely without cutting a release. See docs/releasing.md.
#
# Four jobs by design, for native packaging and least privilege: the two `build`
# matrix copies run the tagged commit's own code on matching x86/ARM hosts with a
# read-only token; `combine` checks out no code and creates the complete checksum
# manifest; `publish` holds the only contents:write token, checks out no code,
# and only attaches the already-built artifacts to a GitHub Release.
#
# scripts/release.sh stamps the release tag into all binaries with the standard Go
# linker and independently executes all six to assert the result before publishing.

on:
  push:
    # Fire on any v-prefixed tag. GitHub's tag-filter glob does not reliably
    # support regex-style quantifiers, and a filter that silently failed to match
    # the release tag would be a far worse failure than a broad match — so the
    # authoritative semver-shape gate lives in scripts/release.sh instead, which
    # fails a non-semver tag (vnext, v2, ...) fast and loudly before building.
    tags: ["v*"]
  workflow_dispatch:

# Least privilege by default: the top-level token can only read. Only the publish
# job elevates to contents:write, so every step that runs repository code stays
# read-only.
permissions:
  contents: read

# Tags retain their exact public identity. Manual dry-runs use a path-safe,
# installable prerelease identity tied to the immutable commit rather than a
# branch name, which may contain slashes.
env:
  STEWARD_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-dev.{0}', github.sha) }}

# Never cancel an in-flight publish; serialize runs per ref instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build / ${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - goarch: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    runs-on: ${{ matrix.runner }}
    # No permissions override: this job inherits the top-level contents:read. It
    # runs the tagged commit's own code (scripts/release.sh), so it deliberately
    # holds NO publish-capable token — publishing is the separate job below.
    steps:
      # Full history supports release notes, tag verification, and local parity.
      # Version identity itself is an explicit linker stamp asserted below.
      - name: Checkout release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Require tag commit on origin/main
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          tagged_commit=$(git rev-parse "${GITHUB_SHA}^{commit}")
          if ! git merge-base --is-ancestor "$tagged_commit" refs/remotes/origin/main; then
            echo "release: tagged commit $tagged_commit is not reachable from protected origin/main" >&2
            exit 1
          fi
          echo "release: tagged commit $tagged_commit is reachable from protected origin/main"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          check-latest: false

      - name: Install native RPM build tooling
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y rpm

      # Cross-compiles the target matrix, packages each as a .tar.gz, writes
      # checksums.txt, and asserts that all six binaries self-report the stamped
      # version on tag builds and manual dry-runs. All output lands in dist/.
      - name: Build release artifacts
        env:
          # rpmbuild validates the host architecture even though Steward's Go
          # binaries are cross-compiled. Give each native runner its Linux and
          # Darwin targets so every RPM is produced on a compatible host.
          STEWARD_RELEASE_TARGETS: linux/${{ matrix.goarch }} darwin/${{ matrix.goarch }}
        run: bash scripts/release.sh

      - name: Verify embedded node release manifests
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/steward_${STEWARD_RELEASE_VERSION}_linux_${{ matrix.goarch }}.tar.gz"
          manifest=$(tar -xOf "$archive" release.json)
          grep -Fxq '  "schema": "steward.release.v2",' <<<"$manifest"
          grep -Fxq '    "admission_fence": {"read_min": 1, "read_max": 2, "write": 2},' <<<"$manifest"
          grep -Fxq '    "connector_receipt_log": {"read_min": 1, "read_max": 3, "write": 3},' <<<"$manifest"
          grep -Fxq '    "gateway_state": {"read_min": 1, "read_max": 4, "write": 4},' <<<"$manifest"
          grep -Fxq "  \"version\": \"${STEWARD_RELEASE_VERSION}\"," <<<"$manifest"
          grep -Fxq '  "os": "linux",' <<<"$manifest"
          grep -Fxq "  \"arch\": \"${{ matrix.goarch }}\"," <<<"$manifest"
          grep -Fq '    "integration/adapters/hermes-agent/adapter.json": "' <<<"$manifest"
          grep -Fq '    "integration/adapters/hermes-agent/fixtures/connector-skill/SKILL.md": "' <<<"$manifest"
          grep -Fq '    "integration/adapters/hermes-agent/fixtures/skill/SKILL.md": "' <<<"$manifest"
          grep -Fq '    "integration/scripts/build-hermes-adapter.sh": "' <<<"$manifest"
          grep -Fq '    "integration/scripts/hermes-feasibility.sh": "' <<<"$manifest"
          grep -Fq '    "integration/scripts/hermes-steward-acceptance.sh": "' <<<"$manifest"
          tar -tzf "$archive" adapters/hermes-agent/adapter.json >/dev/null
          tar -tzf "$archive" adapters/hermes-agent/fixtures/connector-skill/SKILL.md >/dev/null
          tar -tzf "$archive" adapters/hermes-agent/fixtures/skill/SKILL.md >/dev/null
          tar -tzf "$archive" scripts/build-hermes-adapter.sh >/dev/null
          tar -tzf "$archive" scripts/hermes-feasibility.sh >/dev/null
          tar -tzf "$archive" scripts/hermes-steward-acceptance.sh >/dev/null
          deb_contents=$(mktemp)
          rpm_contents=$(mktemp)
          trap 'rm -f "$deb_contents" "$rpm_contents"' EXIT
          dpkg-deb --contents "dist/steward-node_${STEWARD_RELEASE_VERSION}_${{ matrix.goarch }}.deb" >"$deb_contents"
          grep -q './usr/lib/steward-node/release/release.json' "$deb_contents"
          grep -q './usr/lib/steward-node/release/adapters/hermes-agent/adapter.json' "$deb_contents"
          grep -q './usr/lib/steward-node/release/adapters/hermes-agent/fixtures/connector-skill/SKILL.md' "$deb_contents"
          grep -q './usr/lib/steward-node/release/scripts/build-hermes-adapter.sh' "$deb_contents"
          grep -q './usr/lib/steward-node/release/scripts/hermes-feasibility.sh' "$deb_contents"
          grep -q './usr/lib/steward-node/release/scripts/hermes-steward-acceptance.sh' "$deb_contents"
          rpm -qpl "dist/steward-node_${STEWARD_RELEASE_VERSION}_${{ matrix.goarch }}.rpm" >"$rpm_contents"
          grep -q '/usr/lib/steward-node/release/release.json' "$rpm_contents"
          grep -q '/usr/lib/steward-node/release/adapters/hermes-agent/adapter.json' "$rpm_contents"
          grep -q '/usr/lib/steward-node/release/adapters/hermes-agent/fixtures/connector-skill/SKILL.md' "$rpm_contents"
          grep -q '/usr/lib/steward-node/release/scripts/build-hermes-adapter.sh' "$rpm_contents"
          grep -q '/usr/lib/steward-node/release/scripts/hermes-feasibility.sh' "$rpm_contents"
          grep -q '/usr/lib/steward-node/release/scripts/hermes-steward-acceptance.sh' "$rpm_contents"

      - name: Keep one installer copy
        if: matrix.goarch == 'arm64'
        run: rm dist/install-steward.sh

      # Hand this architecture's packages to the combine job. The per-runner
      # checksums are deliberately excluded: combine writes one manifest over
      # the complete matrix after both native builds succeed.
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: steward-dist-${{ matrix.goarch }}
          path: |
            dist/steward_*.tar.gz
            dist/steward-node_*.deb
            dist/steward-node_*.rpm
            dist/install-steward.sh
          retention-days: 7
          if-no-files-found: error

  combine:
    name: combine + checksum
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    # No checkout and no repository code. This job only combines the two native
    # build outputs and computes their public checksum manifest.
    steps:
      - name: Download architecture artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: steward-dist-*
          path: dist
          merge-multiple: true

      - name: Verify matrix and write checksums
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            "steward_${STEWARD_RELEASE_VERSION}_linux_amd64.tar.gz"
            "steward_${STEWARD_RELEASE_VERSION}_linux_arm64.tar.gz"
            "steward_${STEWARD_RELEASE_VERSION}_darwin_amd64.tar.gz"
            "steward_${STEWARD_RELEASE_VERSION}_darwin_arm64.tar.gz"
            "steward-node_${STEWARD_RELEASE_VERSION}_amd64.deb"
            "steward-node_${STEWARD_RELEASE_VERSION}_arm64.deb"
            "steward-node_${STEWARD_RELEASE_VERSION}_amd64.rpm"
            "steward-node_${STEWARD_RELEASE_VERSION}_arm64.rpm"
            "install-steward.sh"
          )
          for artifact in "${expected[@]}"; do
            test -f "dist/$artifact" || {
              echo "release: missing $artifact" >&2
              exit 1
            }
          done
          test "$(find dist -maxdepth 1 -type f ! -name checksums.txt | wc -l)" -eq "${#expected[@]}"
          (cd dist && sha256sum "${expected[@]}" >checksums.txt)

      - name: Upload complete release set
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: steward-dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: combine
    # Publish ONLY on a real semver tag push. A workflow_dispatch run (any branch)
    # never reaches this job, so the dry-run path can neither create nor mutate a
    # release. `needs: combine` also means any failed build, version assertion,
    # or incomplete artifact matrix aborts the publish.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write # the ONLY write token in this workflow; used solely to create the Release
    steps:
      # No checkout: this job runs no repository code. It only fetches the
      # artifacts the read-only build job produced and attaches them, keeping the
      # write-token surface as small as possible.
      - name: Download built artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: steward-dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A semver pre-release tag carries a hyphen (v1.2.3-rc.1); mark those as a
          # GitHub pre-release so they are not surfaced as the "latest" release.
          prerelease=()
          case "${GITHUB_REF_NAME}" in
            *-*) prerelease=(--prerelease) ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            "${prerelease[@]}" \
            dist/steward_*.tar.gz \
            dist/steward-node_*.deb \
            dist/steward-node_*.rpm \
            dist/install-steward.sh \
            dist/checksums.txt
