openapi: 3.0.3
info:
  title: Steward Executor API
  version: "1.8.0"
  description: |
    Public host-local contract for Steward's separate Docker/gVisor executor
    process. The control plane supplies a fully resolved generic OCI workload;
    Executor independently enforces immutable images, resource ceilings, and
    fixed sandbox settings that callers cannot override. Any compatible control
    plane can consume it within the documented host trust boundary.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Steward
    url: https://github.com/hardrails/steward
servers:
  - url: http://127.0.0.1:8090
    description: Default host-local listener
security:
  - bearerAuth: []
tags:
  - name: workloads
    description: Tenant-scoped OCI workload lifecycle.
  - name: admission
    description: Signed, locally bounded deployment admission and receipts.
  - name: state
    description: Explicit lifecycle for tenant-lineage persistent state.
  - name: health
    description: Executor process liveness.
paths:
  /v1/healthz:
    get:
      tags: [health]
      operationId: executorHealth
      summary: Report process liveness
      description: Returns process liveness without requiring the host-control credential.
      security: []
      responses:
        "200":
          description: Executor is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/readiness:
    get:
      tags: [health]
      operationId: executorReadiness
      summary: Report signed-runtime reconciliation readiness
      description: |
        Returns 200 only after the latest bounded reconciliation proved every
        present signed runtime or safely repaired its lifecycle/control state.
        Structural drift, missing objects, or an ambiguous journaled mutation
        returns 503 with a bounded failure report. Executor stays live in that
        degraded state so operators can inspect it and issue authenticated stop
        requests that only deactivate and stop exactly identified local objects.
        Unlike liveness, this endpoint requires the host-control credential.
      responses:
        "200":
          description: Executor is ready for lifecycle mutations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          description: Reconciliation has not run or its latest bounded scan is degraded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
  /v1/workloads:
    post:
      tags: [workloads]
      operationId: provisionWorkload
      summary: Provision a validated workload
      description: |
        Creates a stopped Docker container under gVisor. Replaying the exact
        tenant, instance, and immutable workload returns the existing container
        with 200 only when its stored fingerprint and hardened Docker settings
        still match; any drift returns 409. This compatibility endpoint is
        disabled when signed admission is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Workload"
      responses:
        "200":
          description: Exact idempotent replay of an existing workload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadState"
        "201":
          description: Workload container created in the stopped state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadState"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Signed admission is configured; use `/v1/admissions`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          description: The deterministic runtime reference conflicts or drifted, or the requested image or prepared network disappeared before creation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: A host or per-tenant workload-count, memory, CPU, or PID reservation is exhausted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/admissions:
    post:
      tags: [admission]
      operationId: admitSignedWorkload
      summary: Admit a signed profile capsule for one tenant instance
      description: |
        Verifies the exact publisher-signed capsule against the configured
        site-root-signed policy, binds it to the host-authenticated instance
        intent, applies policy and generation rollback fences, journals the
        Docker mutation, and appends signed node-local receipts. Steward can grant
        persistent state, brokered inference, one declared private service,
        named deny-by-default HTTP(S) egress routes, and named connectors only
        when the corresponding local enforcement topology is configured. A
        connector is an operator-defined remote API capability selected by ID;
        the agent never receives its upstream credential. Persistent state also requires
        the dedicated-host-only unquotaed-volume compatibility flag because the
        portable Docker local-volume driver has no hard byte or inode quota.
        Before any mutation, Executor
        resolves the signed config digest locally, verifies the exact platform,
        rejects image-declared volumes, and executes by that immutable config ID.
        An optional activation object binds a bounded activation ID and the
        digest of a content-free begin assertion to this exact admission. When
        present, Executor requires the signed runtime-capability topology. After
        authority, policy, image, capacity, and other read-only preflights pass,
        it appends an idempotent signed activation-begin receipt before the
        admission-allow receipt, mutation journal, or host mutation. This
        metadata grants no authority; all normal admission checks still apply.
        Admission is blocked while the latest reconciliation is degraded or a
        prior journaled mutation remains ambiguous.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignedAdmissionRequest"
      responses:
        "200":
          description: Exact idempotent replay of an existing admitted workload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedAdmissionState"
        "201":
          description: Signed admission committed and workload created stopped.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedAdmissionState"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Capsule, site policy, caller binding, or rollback fence denied admission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          description: Existing workload drift, unavailable exact image or prepared network, unsafe local image metadata, or a conflicting retained activation-begin identity prevented admission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          description: A signed positive capability is valid but its required local enforcement topology is not configured, or persistent state is disabled because no hard byte or inode quota is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: Signed admission is unconfigured, capacity is exhausted, or durable journal/evidence state requires recovery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workloads/{runtime_ref}/activation-canary-preflight:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [admission]
      operationId: preflightActivationCanary
      summary: Prove a running activation is authorized before Gateway use
      description: |
        Accepts one strict JSON object no larger than 1 MiB. This is the
        read-only authorization boundary an Executor uplink calls immediately
        before it contacts Gateway for an activation canary. Executor serializes
        the check with signed lifecycle mutations and requires ready
        reconciliation, the current site policy, the authenticated tenant
        principal or explicitly enabled host-administrator authority, the exact
        retained activation ID and begin digest, and the complete admitted
        runtime topology in its running state. The response is the lifecycle
        projection derived from the committed signed-admission fence. The
        operation writes no receipt and grants no authority beyond this
        immediate preflight.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivationCanaryPreflight"
      responses:
        "200":
          description: The exact retained activation and its complete admitted topology are currently authorized and running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedAdmissionState"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The workload is not bound to the current uplink tenant principal or explicitly enabled host-administrator authority and site policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          description: The activation identity, running lifecycle, or required topology differs from the committed signed-admission fence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: Signed admission is unavailable or reconciliation is degraded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workloads/{runtime_ref}/activation-checkpoints:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [admission]
      operationId: appendActivationCheckpoint
      summary: Append a signed causal checkpoint for a running activation
      description: |
        Accepts one strict JSON object no larger than 1 MiB and appends a
        content-free activation checkpoint to Executor's signed receipt stream.
        The request supplies only a bounded activation ID and the SHA-256 digest
        of the exact checkpoint assertion. Executor derives the tenant, runtime,
        capsule, policy, and generation from the committed signed-admission
        fence. An uplink-injected tenant principal must match that fence. A
        direct host-local call has no tenant principal and is accepted only when
        `-admission-allow-host-admin-intent` is explicitly enabled; the bearer
        then acts with host-administrator authority. Current site policy must
        still authorize the fence. Executor also requires ready reconciliation
        and proves the exact admitted runtime topology is running before writing
        the receipt. The persisted activation ID must match the request, and the
        persisted begin digest must match the earlier activation-begin receipt;
        the checkpoint request does not carry a begin digest. An exact retry is
        idempotent and does not grow the evidence log; a conflicting identity or
        digest fails closed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivationCheckpoint"
      responses:
        "201":
          description: The checkpoint was appended, or an exact retained checkpoint was replayed idempotently.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationCheckpoint"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The workload is not bound to the current uplink tenant principal or explicitly enabled host-administrator authority and site policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          description: The running workload or its required topology drifted, the checkpoint conflicts with retained activation evidence, or signed stop, destroy, revocation, drift, state-purge, or post-start compensation evidence invalidated the activation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: Signed admission is unavailable, reconciliation is degraded, or the signed evidence log cannot safely retain the checkpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/state/purge:
    post:
      tags: [state]
      operationId: purgeStateLineage
      summary: Permanently purge an inactive persistent-state lineage
      description: |
        Removes the Executor-derived named volume only after authenticated
        tenant/node/generation binding, a committed absent workload tombstone,
        exact managed-volume ownership verification, a durable journal prepare,
        and a signed purge receipt. Active or drifted state is never removed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatePurgeRequest"
      responses:
        "204":
          description: State is absent; repeated authorized purges are idempotent.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Request is not bound to the authenticated signed lineage generation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          description: State is active or its managed tenant-lineage ownership has drifted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          description: The configured Docker backend does not support managed state volumes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: Signed admission, journal, evidence, or reconciliation state is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workloads/{runtime_ref}:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    get:
      tags: [workloads]
      operationId: getWorkload
      summary: Read current workload status
      description: |
        Returns Docker's current status only for an Executor-managed,
        still-hardened container. When signed admission is configured, the
        response also projects the complete committed admission identity,
        including optional activation correlation fields.
      responses:
        "200":
          description: Current Docker workload status and, for a signed runtime, its committed admission projection.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/WorkloadState"
                  - $ref: "#/components/schemas/SignedAdmissionState"
        "400":
          $ref: "#/components/responses/InvalidRuntimeRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/WorkloadDrift"
        "502":
          $ref: "#/components/responses/DockerError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [workloads]
      operationId: destroyWorkload
      summary: Destroy a workload
      description: >-
        Removes only an Executor-managed workload. Without signed admission, an
        absent name is an idempotent success. With signed admission, an absent
        name returns 204 only when an authorized destroyed tombstone is retained;
        an unknown signed runtime reference returns 404. Destroy is blocked while
        signed-runtime reconciliation is degraded because removal is irreversible.
      responses:
        "204":
          description: Workload is absent; authorized retries for a retained signed tombstone also return 204.
        "400":
          $ref: "#/components/responses/InvalidRuntimeRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Workload is not bound to the authenticated signed admission principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/WorkloadDrift"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: Journal, receipt, or reconciliation state prevents a safe mutation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workloads/{runtime_ref}/start:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [workloads]
      operationId: startWorkload
      summary: Idempotently start a workload
      description: Starts only an Executor-managed, still-hardened workload; an already-running workload is a no-op. Start is blocked while signed-runtime reconciliation is degraded because it would widen runtime authority.
      responses:
        "200":
          description: Workload is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadState"
        "400":
          $ref: "#/components/responses/InvalidRuntimeRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Workload is not bound to the authenticated signed admission principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/WorkloadDrift"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: Journal, receipt, or reconciliation state prevents a safe mutation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workloads/{runtime_ref}/stop:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    post:
      tags: [workloads]
      operationId: stopWorkload
      summary: Idempotently stop a workload
      description: |
        In ready state, stops only an Executor-managed, still-hardened workload
        and journals and receipts the transition; an already-stopped workload is
        a no-op. In degraded state, this same endpoint becomes a narrow
        containment operation. It requires the authenticated signed tenant and
        generation, derives the Gateway grant and relay names from the retained
        fence, deactivates that grant, stops only an agent and relay whose exact
        retained identity can be proven, and reinspects their stopped state. It
        does not settle a pending journal operation, update a fence, recreate,
        adopt, or remove an object. A partially verified containment returns 503
        while preserving every safety-only stop that was confirmed.
      responses:
        "200":
          description: Workload is not running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadState"
        "400":
          $ref: "#/components/responses/InvalidRuntimeRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Workload is not bound to the authenticated signed admission principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/WorkloadDrift"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: At least one degraded containment boundary could not be verified inactive or exactly stopped; confirmed safety-only stops are not rolled back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workloads/{runtime_ref}/logs:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    get:
      tags: [workloads]
      operationId: getWorkloadLogs
      summary: Read a bounded workload log tail
      description: Requests Docker's most recent 1000 lines and returns them only when the bounded encoded response is at most 1 MiB.
      responses:
        "200":
          description: Combined stdout/stderr from Docker's 1000-line tail, returned only when its bounded encoded response is at most 1 MiB.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadLogs"
        "400":
          $ref: "#/components/responses/InvalidRuntimeRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/WorkloadDrift"
        "502":
          $ref: "#/components/responses/DockerError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/workloads/{runtime_ref}/egress:
    parameters:
      - $ref: "#/components/parameters/RuntimeRef"
    get:
      tags: [workloads]
      operationId: getWorkloadEgressStats
      summary: Read bounded egress grant statistics
      description: Returns counters and the last destination/decision without URL paths, queries, headers, bodies, or credentials.
      responses:
        "200":
          description: Current gateway statistics for the signed egress grant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EgressStats"
        "400":
          $ref: "#/components/responses/InvalidRuntimeRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: The workload is absent or has no signed egress capability. A grant expected by retained workload state but missing from Gateway is a fail-closed 503.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/WorkloadDrift"
        "502":
          $ref: "#/components/responses/DockerError"
        "503":
          description: The local gateway control boundary is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RuntimeRef:
      name: runtime_ref
      in: path
      required: true
      description: Opaque Executor-issued workload identifier.
      schema:
        type: string
        pattern: "^executor-[a-f0-9]{64}$"
  schemas:
    Workload:
      type: object
      additionalProperties: false
      required: [instance_id, tenant_id, profile_id, image, command, resources, egress]
      properties:
        instance_id:
          type: string
          minLength: 1
          maxLength: 256
        tenant_id:
          type: string
          minLength: 1
          maxLength: 128
        profile_id:
          type: string
          minLength: 1
          maxLength: 128
        image:
          type: string
          maxLength: 1024
          pattern: "^.+@sha256:[a-f0-9]{64}$"
        command:
          type: array
          minItems: 1
          maxItems: 64
          items:
            type: string
            maxLength: 4096
        resources:
          $ref: "#/components/schemas/Resources"
        egress:
          $ref: "#/components/schemas/Egress"
    SignedAdmissionRequest:
      type: object
      additionalProperties: false
      required: [capsule_dsse_base64, intent]
      properties:
        capsule_dsse_base64:
          type: string
          format: byte
          minLength: 1
          maxLength: 1048576
          description: Exact JSON DSSE envelope encoded with standard base64.
        intent:
          $ref: "#/components/schemas/InstanceIntent"
        activation:
          $ref: "#/components/schemas/ActivationAdmission"
    ActivationAdmission:
      type: object
      additionalProperties: false
      required: [schema_version, activation_id, begin_digest]
      description: |
        Optional fresh-admission correlation metadata. After authority, policy,
        and read-only preflights pass, Executor appends the begin digest to its
        signed receipt stream before the admission-allow receipt, mutation
        journal, or host mutation. It persists both identity fields with the
        admitted runtime. These fields grant no admission or lifecycle
        authority.
      properties:
        schema_version:
          type: string
          enum: [steward.executor-activation-admission.v1]
        activation_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        begin_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
    ActivationCheckpoint:
      type: object
      additionalProperties: false
      required: [schema_version, activation_id, checkpoint_digest]
      description: |
        Content-free request and acknowledgment for one causal checkpoint in the
        signed Executor receipt stream. The digest identifies the coordinator's
        separately retained canonical checkpoint assertion.
      properties:
        schema_version:
          type: string
          enum: [steward.executor-activation-checkpoint.v1]
        activation_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        checkpoint_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
    ActivationCanaryPreflight:
      type: object
      additionalProperties: false
      required: [schema_version, activation_id, activation_begin_digest]
      description: |
        Read-only request used immediately before an Executor uplink contacts
        Gateway for one closed activation canary. The identity fields must
        exactly match the retained signed admission.
      properties:
        schema_version:
          type: string
          enum: [steward.executor-activation-canary-preflight.v1]
        activation_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        activation_begin_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
    InstanceIntent:
      type: object
      additionalProperties: false
      required:
        - tenant_id
        - node_id
        - instance_id
        - lineage_id
        - generation
        - capsule_digest
        - resources
        - capabilities
        - state_disposition
      properties:
        tenant_id:
          type: string
          minLength: 1
          maxLength: 128
        node_id:
          type: string
          minLength: 1
          maxLength: 128
        instance_id:
          type: string
          minLength: 1
          maxLength: 256
        lineage_id:
          type: string
          minLength: 1
          maxLength: 256
        generation:
          type: integer
          format: int64
          minimum: 1
        capsule_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
        resources:
          $ref: "#/components/schemas/Resources"
        capabilities:
          $ref: "#/components/schemas/Capabilities"
        state_disposition:
          type: string
          enum: [none, new, resume]
        inference_route_id:
          type: string
          maxLength: 128
        model_alias:
          type: string
          maxLength: 256
        service_id:
          type: string
          maxLength: 128
        egress_route_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        connector_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        effect_mode:
          type: string
          enum: [standard, authorized]
          description: |
            Explicit external-effect policy selected under signed tenant policy.
            `authorized` forbids generic egress and requires every selected
            connector call to carry an exact-request permit. A one-approver
            policy uses permit version 2; a multi-party policy uses version 3.
    Capabilities:
      type: object
      additionalProperties: false
      properties:
        state:
          type: boolean
        inference:
          type: boolean
        service:
          type: boolean
        egress:
          type: boolean
        connector:
          type: boolean
      description: Omitted capability fields are false. Positive capabilities require their configured enforcement topology; otherwise admission fails closed with 501. Persistent state also requires an explicit dedicated-host compatibility setting and signed policy with exactly one tenant because local Docker volumes have no portable hard byte or inode quota.
    StatePurgeRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, node_id, lineage_id, generation]
      properties:
        tenant_id:
          type: string
          minLength: 1
          maxLength: 128
        node_id:
          type: string
          minLength: 1
          maxLength: 128
        lineage_id:
          type: string
          minLength: 1
          maxLength: 256
        generation:
          type: integer
          format: int64
          minimum: 1
    SignedAdmissionState:
      type: object
      additionalProperties: false
      required: [runtime_ref, status, capsule_digest, policy_digest, generation, evidence_key_id]
      properties:
        runtime_ref:
          type: string
          pattern: "^executor-[a-f0-9]{64}$"
        status:
          type: string
        capsule_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
        policy_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
        generation:
          type: integer
          format: int64
          minimum: 1
        evidence_key_id:
          type: string
          pattern: "^[a-f0-9]{32}$"
        grant_id:
          type: string
          pattern: "^grant-[a-f0-9]{64}$"
        service_path:
          type: string
          pattern: "^/v1/services/grant-[a-f0-9]{64}/$"
        service_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
          description: Present when the admitted service has at least one tenant task authority.
        task_authorities:
          type: array
          minItems: 1
          maxItems: 8
          uniqueItems: true
          items:
            $ref: "#/components/schemas/TaskAuthority"
          description: Canonically sorted public tenant keys authorized by signed site policy for this exact service. Private signing keys are never returned to or stored on the node.
        egress_proxy:
          type: string
          enum: ["http://steward-relay:8082"]
        egress_route_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        connector_url:
          type: string
          enum: ["http://steward-relay:8081"]
        connector_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        effect_mode:
          type: string
          enum: [standard, authorized]
          description: |
            Effective signed-admission effect mode. The field is absent for
            policies created before explicit effect modes.
        action_approval_threshold:
          type: integer
          minimum: 1
          maximum: 8
          description: Number of distinct admitted action-authority signatures Gateway requires for each authorized connector effect. Present only with authorized effect mode.
        action_authorities:
          type: array
          minItems: 1
          maxItems: 8
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ActionAuthority"
          description: Canonically sorted public tenant action keys narrowed by signed site policy to this admission's selected connectors. Private signing keys are never returned to or stored on the node.
        route_policy_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
          description: Deterministic non-secret digest of the effective inference, task-authorized service, egress, and connector route policy retained by Gateway.
        activation_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
          description: Present only when admission used activation correlation metadata.
        activation_begin_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
          description: Digest written to signed Executor evidence after read-only admission preflights and before the admission-allow receipt or host mutation; present with activation_id.
    TaskAuthority:
      type: object
      additionalProperties: false
      required: [key_id, public_key]
      properties:
        key_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        public_key:
          type: string
          format: byte
          description: Canonical standard-base64 Ed25519 public key.
    ActionAuthority:
      type: object
      additionalProperties: false
      required: [key_id, public_key, connector_ids]
      properties:
        key_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        public_key:
          type: string
          format: byte
          description: Canonical standard-base64 Ed25519 public key.
        connector_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
          description: Sorted connector IDs this action key may approve in this admission.
    Resources:
      type: object
      additionalProperties: false
      required: [memory_bytes, cpu_millis, pids]
      properties:
        memory_bytes:
          type: integer
          format: int64
          minimum: 1
        cpu_millis:
          type: integer
          format: int64
          minimum: 1
        pids:
          type: integer
          format: int64
          minimum: 1
    Egress:
      type: object
      additionalProperties: false
      properties:
        allowed_hosts:
          type: array
          maxItems: 0
          items:
            type: string
      description: The unsigned compatibility endpoint admits no networking; any non-empty allowlist is rejected. Signed egress is selected only through InstanceIntent route IDs.
    WorkloadState:
      type: object
      additionalProperties: false
      required: [runtime_ref, status]
      properties:
        runtime_ref:
          type: string
          pattern: "^executor-[a-f0-9]{64}$"
        status:
          type: string
          enum: [created, restarting, running, removing, paused, exited, dead]
        egress_proxy:
          type: string
          enum: ["http://steward-relay:8082"]
        egress_route_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        connector_url:
          type: string
          enum: ["http://steward-relay:8081"]
        connector_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
    EgressStats:
      type: object
      additionalProperties: false
      required: [allowed, denied, bytes_from_agent, bytes_to_agent]
      properties:
        allowed:
          type: integer
          format: int64
          minimum: 0
        denied:
          type: integer
          format: int64
          minimum: 0
        bytes_from_agent:
          type: integer
          format: int64
          minimum: 0
        bytes_to_agent:
          type: integer
          format: int64
          minimum: 0
        last_destination:
          type: string
        last_decision:
          type: string
        last_observed_at:
          type: string
          format: date-time
    WorkloadLogs:
      type: object
      additionalProperties: false
      required: [runtime_ref, logs]
      properties:
        runtime_ref:
          type: string
        logs:
          type: string
          maxLength: 1048576
    Health:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    Readiness:
      type: object
      additionalProperties: false
      required: [status, secure_admission]
      properties:
        status:
          type: string
          enum: [ready, reconciling, degraded]
        secure_admission:
          type: boolean
        last_attempt:
          type: string
          format: date-time
        reconciliation:
          $ref: "#/components/schemas/ReconcileReport"
    ReconcileReport:
      type: object
      additionalProperties: false
      required: [ready, checked, changed, revoked]
      properties:
        ready:
          type: boolean
        checked:
          type: integer
          minimum: 0
          maximum: 4096
        changed:
          type: integer
          minimum: 0
          maximum: 4096
        revoked:
          type: integer
          minimum: 0
          maximum: 4096
        failures:
          type: array
          maxItems: 64
          items:
            $ref: "#/components/schemas/ReconcileFailure"
        dropped_failures:
          type: integer
          minimum: 0
    ReconcileFailure:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        runtime_ref:
          type: string
          pattern: "^executor-[a-f0-9]{64}$"
        code:
          type: string
        message:
          type: string
          maxLength: 256
    Error:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
  responses:
    InvalidRequest:
      description: Malformed JSON, unknown field, policy violation, or resource request above the host ceiling.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InvalidRuntimeRef:
      description: The runtime reference is not an Executor-issued identifier.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Valid host-control bearer credential required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: No Executor-managed workload has this runtime reference.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MethodNotAllowed:
      description: Method not allowed for this path.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    WorkloadDrift:
      description: The managed container no longer matches its admitted fingerprint or fixed sandbox policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    DockerError:
      description: The bounded local Docker Engine operation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Executor recovered an unexpected internal failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
