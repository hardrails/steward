  /v1/tenants/{tenant_id}/deployments/{deployment_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
      - $ref: "#/components/parameters/DeploymentID"
    get:
      tags: [deployments]
      operationId: getControlDeployment
      summary: Get one desired deployment
      description: Returns retained desired state, progress, and public delegation scope without returning the signed artifact bytes.
