        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
    put:
      tags: [deployments]
      operationId: applyControlDeployment
      summary: Create or roll forward desired deployment state
      description: |
        Retains a publisher-signed capsule and tenant-signed controller
        delegation as public authority envelopes. Control validates their
        bounded routing statement but does not treat the tenant signature as
        trusted; Executor verifies that signature against authenticated site
        policy before every effect. Exact retries are idempotent. A changed
        generation must supply the current `expected_revision`.
      requestBody:
        required: true
