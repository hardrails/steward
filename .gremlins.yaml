# Gremlins mutation-testing config. See https://gremlins.dev and the go-gremlins
# repo's own .gremlins.yaml for the format.
#
# The gate is efficacy — KILLED / (KILLED + LIVED), the conventional mutation
# "kill rate". CI runs `gremlins unleash .`, which exits non-zero when efficacy
# is below this floor. NOT_COVERED mutants (gremlins tests only covered mutants)
# are excluded from efficacy by construction; that is why main()'s thin CLI/glue
# — which gremlins sees as uncovered, since its own `go test` coverage does not
# instrument the compiled binary — does not drag this number down. mutant-coverage
# (--threshold-mcover) is a DIFFERENT metric and is deliberately not gated here.
#
# Floor rationale: measured efficacy is ~78% (Killed 102 / Lived 28). 70 leaves a
# working margin above the run-to-run jitter inherent to mutation testing while
# still catching a real regression in the gate-critical packages.
#
# Keep execution below the runner's CPU count. Each worker launches a separately
# compiled package test, and four default workers exhausted the 4-vCPU runner's
# memory once the control-plane packages grew. Two single-CPU test workers leave
# memory and scheduler headroom while retaining parallel mutation coverage.
unleash:
  workers: 2
  test-cpu: 1
  threshold:
    efficacy: 70
