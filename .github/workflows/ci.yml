name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  console:
    name: React console / audit / reproducibility
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - name: Verify committed air-gapped console
        run: |
          npm ci --prefix internal/controlplane/console --ignore-scripts --no-audit --no-fund
          npm audit --prefix internal/controlplane/console --audit-level=moderate
          npm --prefix internal/controlplane/console run check
          npm --prefix internal/controlplane/console run build
          git diff --exit-code -- internal/controlplane/console/dist

  go:
    name: build / vet / test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          check-latest: false
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...
      - name: Install native RPM build tooling
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y rpm
      - name: node appliance script syntax
        run: >-
          bash -n scripts/install-node.sh scripts/activate-node-release.sh
          scripts/node-preflight.sh scripts/node-doctor.sh scripts/node-doctor-test.sh
          scripts/configure-node.sh scripts/configure-admission.sh
          scripts/install-steward.sh scripts/install-control.sh scripts/control-doctor.sh
          scripts/control-install-smoke.sh scripts/bundled-control-node-test.sh
          scripts/control-acceptance.sh scripts/uninstall-node.sh scripts/node-removal-guard.sh
          scripts/build-deb.sh scripts/build-rpm.sh scripts/build-hermes-adapter.sh
          scripts/hermes-feasibility.sh scripts/hermes-steward-acceptance.sh
          scripts/build-openclaw-adapter.sh scripts/openclaw-feasibility.sh
          scripts/write-release-manifest.sh
          scripts/node-upgrade-smoke.sh scripts/privileged-shell-test.sh
          scripts/node-installer-security-test.sh scripts/configure-input-boundary-test.sh
          scripts/node-control-plane-conflict-test.sh
          scripts/check-docs-consistency.sh
          scripts/openbao-materializer-smoke.sh
          scripts/signed-admission-acceptance.sh
          scripts/egress-acceptance.sh scripts/positive-capabilities-acceptance.sh
          packaging/debian/preinst packaging/debian/postinst
          packaging/debian/prerm packaging/debian/postrm
      - name: Node upgrade transaction smoke
        run: STEWARD_REQUIRE_ROOT_SMOKE=1 bash scripts/node-upgrade-smoke.sh
      - name: Node privileged shell boundary
        run: bash scripts/privileged-shell-test.sh
      - name: Node installer hostile inputs
        run: bash scripts/node-installer-security-test.sh
      - name: Node configuration input boundary
        run: STEWARD_REQUIRE_ROOT_SMOKE=1 bash scripts/configure-input-boundary-test.sh
      - name: Node and control-plane host separation
        run: bash scripts/node-control-plane-conflict-test.sh
      - name: Node doctor hermetic checks
        run: bash scripts/node-doctor-test.sh
      - name: Bundled controller node enrollment checks
        run: bash scripts/bundled-control-node-test.sh
      - name: Steward Control black-box acceptance
        run: bash scripts/control-acceptance.sh
      - name: Steward Control Terraform module
        run: bash integrations/terraform/modules/steward-control/tests/test.sh
      - name: Steward node Terraform module
        run: bash integrations/terraform/modules/steward-node/tests/test.sh
      - name: Documentation consistency
        run: bash scripts/check-docs-consistency.sh
      - name: OpenBao materializer compatibility
        run: bash scripts/openbao-materializer-smoke.sh
      - name: Installer plan smoke
        run: |
          /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --stage-only --version v0.0.0 --package deb | grep -q 'package:      deb'
          /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --stage-only --version v0.0.0 --package rpm | grep -q 'package:      rpm'
          /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --stage-only --version v0.0.0 --package tar | grep -q 'package:      tar'
          if /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --version v0.0.0 2>/dev/null; then
            echo 'full unattended install accepted missing enrollment inputs' >&2
            exit 1
          fi
          /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --local-only --version v0.0.0 --package tar \
            --admission-policy /trust/policy.dsse.json \
            --site-root-public-key /trust/site-root.public \
            --site-root-key-id site-root --node-id node-1 | grep -q 'admission:    signed'
          if /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --stage-only --version v0.0.0 --install-gvisor 2>/dev/null; then
            echo 'staged install accepted an impossible gVisor request' >&2
            exit 1
          fi
          if /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --local-only --version v0.0.0 --admission-policy /trust/policy.dsse.json 2>/dev/null; then
            echo 'installer accepted partial signed-admission trust' >&2
            exit 1
          fi
          if /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --stage-only --version v0.0.0-01 2>/dev/null; then
            echo 'installer accepted a leading-zero numeric prerelease identifier' >&2
            exit 1
          fi
          /bin/bash -p scripts/install-steward.sh --non-interactive --dry-run \
            --stage-only --version v0.0.0-rc.1 --package tar | grep -q 'version:      v0.0.0-rc.1'
      - name: Native package smoke
        run: |
          unset TAR_OPTIONS GZIP POSIXLY_CORRECT
          long_release="v1.2.3-$(printf 'a%.0s' {1..122})"
          if STEWARD_RELEASE_VERSION="$long_release" STEWARD_RELEASE_TARGETS=linux/amd64 \
            /bin/bash -p scripts/release.sh >/tmp/steward-overlong-release.out 2>&1; then
            echo 'release accepted an explicit version longer than 128 bytes' >&2
            exit 1
          fi
          grep -Fq 'explicit STEWARD_RELEASE_VERSION must be a release tag of at most 128 bytes' \
            /tmp/steward-overlong-release.out
          stage=$(mktemp -d)
          smoke=$(mktemp -d)
          trap 'rm -rf "$stage" "$smoke" /tmp/steward-node-test.deb /tmp/steward-node-test.rpm \
            /tmp/steward-node-test.deb.contents /tmp/steward-node-test.rpm.contents' EXIT
          mkdir -p "$stage/adapters" "$stage/deploy" "$stage/scripts"
          go build -o "$stage/steward" ./cmd/steward
          go build -o "$stage/steward-control" ./cmd/steward-control
          go build -o "$stage/steward-executor" ./cmd/steward-executor
          go build -o "$stage/stewardctl" ./cmd/stewardctl
          go build -o "$stage/steward-mcp" ./cmd/steward-mcp
          go build -o "$stage/steward-gateway" ./cmd/steward-gateway
          go build -o "$stage/steward-relay" ./cmd/steward-relay
          cp -R adapters/hermes-agent adapters/openclaw "$stage/adapters/"
          cp -R deploy/config deploy/systemd "$stage/deploy/"
          rm -f "$stage/deploy/config/control.env" \
            "$stage/deploy/systemd/steward-control.service"
          cp scripts/install-node.sh scripts/activate-node-release.sh \
            scripts/node-preflight.sh scripts/node-doctor.sh scripts/configure-node.sh scripts/configure-admission.sh \
            scripts/uninstall-node.sh scripts/node-removal-guard.sh scripts/build-relay-image.sh \
            scripts/build-hermes-adapter.sh scripts/hermes-feasibility.sh \
            scripts/hermes-steward-acceptance.sh scripts/build-openclaw-adapter.sh \
            scripts/openclaw-feasibility.sh "$stage/scripts/"
          cp LICENSE README.md "$stage/"
          test "$("$stage/scripts/hermes-steward-acceptance.sh" --check-layout)" = "$stage"
          mkdir -p "$smoke/layout/release/integration/scripts"
          cp "$stage/steward-executor" "$stage/steward-gateway" "$stage/steward-relay" \
            "$stage/stewardctl" "$smoke/layout/release/"
          cp "$stage/scripts/hermes-steward-acceptance.sh" \
            "$smoke/layout/release/integration/scripts/"
          ln -s "$smoke/layout/release/integration/scripts/hermes-steward-acceptance.sh" \
            "$smoke/layout/hermes-steward-acceptance"
          test "$("$smoke/layout/hermes-steward-acceptance" --check-layout)" = \
            "$smoke/layout/release"
          bash scripts/write-release-manifest.sh "$stage" v0.0.0-test linux "$(go env GOARCH)"
          grep -Fq '    "steward-control": "' "$stage/release.json"
          grep -Fxq '    "connector_receipt_log": {"read_min": 1, "read_max": 6, "write": 6},' "$stage/release.json"
          grep -Fxq '    "evidence_log": {"read_min": 1, "read_max": 2, "write": 2},' "$stage/release.json"
          grep -Fxq '    "gateway_state": {"read_min": 1, "read_max": 6, "write": 6},' "$stage/release.json"
          grep -Fxq '    "uplink_delivery_state": {"read_min": 2, "read_max": 4, "write": 4},' "$stage/release.json"
          test "$(sed -n '/^  "files": {$/,/^  }$/p' "$stage/release.json" | grep -c '^    "')" -eq 61
          grep -Fxq 'EXECUTOR_UPLINK_DELIVERY_STATE_FILE=' "$stage/deploy/config/executor.env"
          grep -Fxq 'EXECUTOR_UPLINK_PROTOCOL_VERSION=0' "$stage/deploy/config/executor.env"
          grep -Fxq 'EXECUTOR_EVIDENCE_UPLINK_ENABLED=false' "$stage/deploy/config/executor.env"
          grep -Fq -- '-uplink-delivery-state-file=${EXECUTOR_UPLINK_DELIVERY_STATE_FILE}' \
            "$stage/deploy/systemd/steward-executor.service"
          grep -Fq -- '-uplink-protocol-version=${EXECUTOR_UPLINK_PROTOCOL_VERSION}' \
            "$stage/deploy/systemd/steward-executor.service"
          grep -Fq -- '-evidence-uplink=${EXECUTOR_EVIDENCE_UPLINK_ENABLED}' \
            "$stage/deploy/systemd/steward-executor.service"
          grep -Fq -- '-uplink-delivery-state-file "${executor[EXECUTOR_UPLINK_DELIVERY_STATE_FILE]:-}"' \
            "$stage/scripts/node-preflight.sh"
          grep -Fq -- '-uplink-protocol-version "$uplink_protocol"' \
            "$stage/scripts/node-preflight.sh"
          grep -Fq -- '-evidence-uplink="$evidence_enabled"' \
            "$stage/scripts/node-preflight.sh"
          cp "$stage/release.json" "$stage/release.first.json"
          bash scripts/write-release-manifest.sh "$stage" v0.0.0-test linux "$(go env GOARCH)"
          cmp "$stage/release.first.json" "$stage/release.json"
          rm "$stage/release.first.json"
          mkdir -p "$smoke/fake-bin"
          # shellcheck disable=SC2016 # Write literal positional-parameter checks into the fixture.
          printf '%s\n' '#!/usr/bin/env bash' \
            'if [[ ${1:-} == info && $# -eq 1 ]]; then exit 0; fi' \
            'if [[ ${1:-} == info && ${2:-} == --format ]]; then echo '\''{"runc":{}}'\''; exit 0; fi' \
            'exit 2' >"$smoke/fake-bin/docker"
          chmod 0755 "$smoke/fake-bin/docker"
          if PATH="$smoke/fake-bin:$PATH" "$stage/scripts/build-hermes-adapter.sh" \
            --non-interactive --output "$smoke/archive.tar" --source-dir "$smoke/missing" \
            2>"$smoke/archive.stderr"; then
            echo 'archive-layout builder unexpectedly passed without runsc' >&2
            exit 1
          fi
          grep -Fxq 'build-hermes-adapter: Docker runtime runsc is not registered' "$smoke/archive.stderr"
          mkdir -p "$smoke/installed/integration/adapters" "$smoke/installed/integration/scripts" \
            "$smoke/libexec"
          cp -R "$stage/adapters/hermes-agent" "$smoke/installed/integration/adapters/"
          cp "$stage/scripts/build-hermes-adapter.sh" "$smoke/installed/integration/scripts/"
          cp "$stage/release.json" "$smoke/installed/"
          ln -s "$smoke/installed/integration/scripts/build-hermes-adapter.sh" \
            "$smoke/libexec/build-hermes-adapter"
          if PATH="$smoke/fake-bin:$PATH" "$smoke/libexec/build-hermes-adapter" \
            --non-interactive --output "$smoke/installed.tar" --source-dir "$smoke/missing" \
            2>"$smoke/installed.stderr"; then
            echo 'installed-layout builder unexpectedly passed without runsc' >&2
            exit 1
          fi
          grep -Fxq 'build-hermes-adapter: Docker runtime runsc is not registered' "$smoke/installed.stderr"
          touch "$stage/adapters/hermes-agent/unlisted"
          if bash scripts/write-release-manifest.sh "$stage" v0.0.0-test linux "$(go env GOARCH)" 2>/dev/null; then
            echo 'release manifest accepted an unlisted adapter file' >&2
            exit 1
          fi
          rm "$stage/adapters/hermes-agent/unlisted"
          bash scripts/build-deb.sh "$stage" v0.0.0-test "$(go env GOARCH)" \
            /tmp/steward-node-test.deb
          bash scripts/build-rpm.sh "$stage" v0.0.0-test "$(go env GOARCH)" \
            /tmp/steward-node-test.rpm
          dpkg-deb --info /tmp/steward-node-test.deb
          dpkg-deb --contents /tmp/steward-node-test.deb > /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/steward-control' /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/steward-executor' /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/stewardctl' /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/steward-mcp' /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/steward-gateway' /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/release.json' /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/adapters/hermes-agent/adapter.json' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/adapters/hermes-agent/fixtures/connector-skill/SKILL.md' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/adapters/openclaw/adapter.json' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/scripts/build-hermes-adapter.sh' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/scripts/hermes-feasibility.sh' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/scripts/hermes-steward-acceptance.sh' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/scripts/build-openclaw-adapter.sh' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/scripts/openclaw-feasibility.sh' \
            /tmp/steward-node-test.deb.contents
          grep -q './usr/lib/steward-node/release/scripts/node-doctor.sh' \
            /tmp/steward-node-test.deb.contents
          if grep -Eq 'control\.env|steward-control\.service|install-control\.sh|control-doctor\.sh' \
            /tmp/steward-node-test.deb.contents; then
            echo 'node DEB unexpectedly contains controller deployment assets' >&2
            exit 1
          fi
          dpkg-deb --ctrl-tarfile /tmp/steward-node-test.deb | \
            tar -xOf - ./postinst | grep -q -- "--expected-version 'v0.0.0-test'"
          dpkg-deb --ctrl-tarfile /tmp/steward-node-test.deb | \
            tar -xOf - ./preinst | grep -Fq 'steward.node-role-claim.v1'
          rpm -qpi /tmp/steward-node-test.rpm
          rpm -qpl /tmp/steward-node-test.rpm > /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/steward-control' /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/steward-executor' /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/stewardctl' /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/steward-mcp' /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/release.json' /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/adapters/hermes-agent/adapter.json' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/adapters/hermes-agent/fixtures/connector-skill/SKILL.md' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/adapters/openclaw/adapter.json' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/scripts/build-hermes-adapter.sh' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/scripts/hermes-feasibility.sh' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/scripts/hermes-steward-acceptance.sh' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/scripts/build-openclaw-adapter.sh' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/scripts/openclaw-feasibility.sh' \
            /tmp/steward-node-test.rpm.contents
          grep -q '/usr/lib/steward-node/release/scripts/node-doctor.sh' \
            /tmp/steward-node-test.rpm.contents
          if grep -Eq 'control\.env|steward-control\.service|install-control\.sh|control-doctor\.sh' \
            /tmp/steward-node-test.rpm.contents; then
            echo 'node RPM unexpectedly contains controller deployment assets' >&2
            exit 1
          fi
          rpm -qp --scripts /tmp/steward-node-test.rpm | \
            grep -q -- "--expected-version 'v0.0.0-test'"
          rpm -qp --scripts /tmp/steward-node-test.rpm | \
            grep -Fq 'steward.node-role-claim.v1'

      - name: Controller installer transaction smoke
        run: bash scripts/control-install-smoke.sh

  lint:
    name: golangci-lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8

  openapi:
    name: openapi lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: spectral lint
        run: npx --yes @stoplight/spectral-cli@6.16.1 lint --fail-severity=error 'openapi/*.yaml'

  coverage:
    name: coverage
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          check-latest: false
      # Honest aggregate coverage: unit coverage unioned with the real main()
      # coverage recovered from the -cover-instrumented subprocess integration
      # tests (see scripts/coverage.sh). Fails below the 85% floor.
      - name: coverage floor (aggregate >= 85%)
        run: bash scripts/coverage.sh 0.85

  mutation:
    name: mutation
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          check-latest: false
      # gremlins is a CI-only tool: installed as a pinned versioned binary, never
      # imported and never added to go.mod/go.sum (verified: go list -m all still
      # lists only this module). The efficacy floor lives in .gremlins.yaml.
      # Pinned to the v0.6.0 tag's commit, not the tag itself, matching the
      # full-SHA pinning convention used for the actions/* steps above.
      - name: install gremlins (pinned)
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@e05b1d47b8c55748e50abc28ff6b132c536bacca # v0.6.0
      - name: mutation testing (efficacy >= 70%)
        run: '"$(go env GOPATH)/bin/gremlins" unleash .'

  smoke:
    name: smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          check-latest: false
      # Build the real release binary, serve it, assert GET /v1/healthz -> 200
      # {"status":"ok"}, then SIGTERM and assert a clean, panic-free exit.
      - name: smoke test (healthz + clean shutdown)
        run: bash scripts/smoke.sh
