        - request_id
        - node_id
        - tenant_id
        - runtime_ref
        - generation
        - activation_id
        - activation_begin_digest
        - state
        - baseline_head
        - final_head
        - frame_count
        - captured_bytes
        - armed_at
        - expires_at
      properties:
        capture_id:
          $ref: "#/components/schemas/Identifier128"
        request_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        runtime_ref:
          type: string
          minLength: 73
          maxLength: 73
          pattern: '^executor-[a-f0-9]{64}$'
        generation:
          type: integer
          minimum: 1
        activation_id:
          $ref: "#/components/schemas/Identifier128"
        activation_begin_digest:
          $ref: "#/components/schemas/SHA256Digest"
        activation_begin_sequence:
          type: integer
          minimum: 1
        state:
          type: string
          enum: [armed, observed, sealed, expired, failed]
        baseline_head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
        final_head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
        frame_count:
          type: integer
          minimum: 0
          maximum: 128
        captured_bytes:
          type: integer
          minimum: 0
          maximum: 524288
        capsule_digest:
          $ref: "#/components/schemas/SHA256Digest"
        policy_digest:
          $ref: "#/components/schemas/SHA256Digest"
        activation_checkpoint_digest:
          $ref: "#/components/schemas/SHA256Digest"
        canary_command_id:
          $ref: "#/components/schemas/Identifier256"
        armed_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        observed_at:
          type: string
          format: date-time
        sealed_at:
          type: string
          format: date-time
        expired_at:
          type: string
          format: date-time
        failed_at:
          type: string
          format: date-time
        failure:
          type: string
          enum:
            - capture_overflow
            - coordinate_changed
            - evidence_finding
            - target_contradiction
            - storage_capacity
      description: |
        Frame-free site-administrator view. Every state binds the expected
        activation-begin digest. After the matching begin is witnessed,
        `armed` also carries its sequence plus capsule and policy digests.
        `observed` and `sealed` bind exactly one begin followed by exactly one
        activation checkpoint; only `sealed` names a canary command. `expired`
        and `failed` are terminal and cannot be exported.
    ControllerEvidenceCapture:
      type: object
      additionalProperties: false
      required:
        - payload_type
        - statement
        - signed_frames_base64
        - witness_public_key_base64
        - witness_public_key_sha256
        - signature_base64
      properties:
        payload_type:
          type: string
          enum: [application/vnd.steward.controller-evidence-capture.v1+binary]
        statement:
          $ref: "#/components/schemas/ControllerEvidenceCaptureStatement"
        signed_frames_base64:
          type: array
          nullable: false
          minItems: 1
          maxItems: 128
          x-steward-max-decoded-bytes: 524288
          description: |
            Canonical standard-base64 encodings of exact native,
            length-prefixed Executor evidence frames. The decoded collection
            is limited to 512 KiB and the complete JSON response to 1 MiB.
          items:
            type: string
            minLength: 1
            maxLength: 87388
            pattern: '^[A-Za-z0-9+/]+={0,2}$'
        witness_public_key_base64:
          type: string
          minLength: 44
          maxLength: 44
          pattern: '^[A-Za-z0-9+/]{43}=$'
          description: Self-describing Ed25519 public key; not a trust anchor.
        witness_public_key_sha256:
          $ref: "#/components/schemas/SHA256Digest"
        signature_base64:
          type: string
          minLength: 88
          maxLength: 88
          pattern: '^[A-Za-z0-9+/]{86}==$'
    ControllerEvidenceCaptureStatement:
      type: object
      additionalProperties: false
      required:
        - protocol_version
        - controller_instance_id
        - capture_id
        - node_id
        - tenant_id
        - runtime_ref
        - generation
        - activation_id
        - canary_command_id
        - activation_begin_digest
        - activation_begin_sequence
        - activation_checkpoint_digest
        - capsule_digest
        - policy_digest
        - identity_proof
        - baseline_head
        - final_head
        - frame_count
        - frames_digest
        - armed_at
        - observed_at
        - sealed_at
        - exported_at
      properties:
        protocol_version:
          type: integer
          enum: [1]
        controller_instance_id:
          $ref: "#/components/schemas/Identifier128"
        capture_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        runtime_ref:
          type: string
          minLength: 73
          maxLength: 73
          pattern: '^executor-[a-f0-9]{64}$'
        generation:
          type: integer
          minimum: 1
        activation_id:
          $ref: "#/components/schemas/Identifier128"
        canary_command_id:
          $ref: "#/components/schemas/Identifier256"
        activation_begin_digest:
          $ref: "#/components/schemas/SHA256Digest"
        activation_begin_sequence:
          type: integer
          minimum: 1
        activation_checkpoint_digest:
          $ref: "#/components/schemas/SHA256Digest"
        capsule_digest:
          $ref: "#/components/schemas/SHA256Digest"
        policy_digest:
          $ref: "#/components/schemas/SHA256Digest"
        identity_proof:
          $ref: "#/components/schemas/ExecutorEvidenceIdentityProofV1"
        baseline_head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
        final_head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
        frame_count:
          type: integer
          minimum: 1
          maximum: 128
        frames_digest:
          $ref: "#/components/schemas/SHA256Digest"
        armed_at:
          type: string
          format: date-time
        observed_at:
          type: string
          format: date-time
        sealed_at:
          type: string
          format: date-time
        exported_at:
          type: string
          format: date-time
    ExecutorEvidenceHeadProof:
      type: object
      additionalProperties: false
      required: [claim, signature_base64]
      properties:
        claim:
          $ref: "#/components/schemas/ExecutorEvidenceHeadClaim"
        signature_base64:
          type: string
          description: Canonical base64 encoding of a 64-byte Ed25519 signature.
          minLength: 88
          maxLength: 88
          pattern: '^[A-Za-z0-9+/]{86}==$'
    ExecutorEvidenceHeadClaim:
      type: object
      additionalProperties: false
      required:
        - protocol_version
        - controller_instance_id
        - control_node_id
        - stream
        - receipt_node_id
        - receipt_epoch
        - base_sequence
        - base_chain_hash
        - sequence
        - chain_hash
        - frame_count
        - frames_digest
        - public_key_sha256
        - challenge
      properties:
        protocol_version:
          type: integer
          enum: [1]
        controller_instance_id:
          $ref: "#/components/schemas/Identifier128"
        control_node_id:
          $ref: "#/components/schemas/Identifier128"
        stream:
          type: string
          enum: [executor]
        receipt_node_id:
          $ref: "#/components/schemas/Identifier128"
        receipt_epoch:
          type: integer
          minimum: 1
        base_sequence:
          type: integer
          minimum: 0
          description: Sequence from the controller checkpoint returned by the associated poll.
        base_chain_hash:
          allOf:
            - $ref: "#/components/schemas/SHA256Digest"
          description: Chain hash from the controller checkpoint returned by the associated poll.
        sequence:
          type: integer
          minimum: 0
        chain_hash:
          $ref: "#/components/schemas/SHA256Digest"
        frame_count:
          type: integer
          minimum: 0
          maximum: 128
          description: Number of decoded signed frames committed by this proof.
        frames_digest:
          allOf:
            - $ref: "#/components/schemas/SHA256Digest"
          description: Domain-separated digest over frame count, each decoded frame length, and exact frame bytes.
        public_key_sha256:
          $ref: "#/components/schemas/SHA256Digest"
        challenge:
          type: string
          minLength: 43
          maxLength: 342
          pattern: '^[A-Za-z0-9_-]+$'
    ExecutorEvidenceHead:
      type: object
      additionalProperties: false
      required: [stream, receipt_node_id, receipt_epoch, sequence, chain_hash, public_key_sha256]
      properties:
        stream:
          type: string
          enum: [executor]
        receipt_node_id:
          $ref: "#/components/schemas/Identifier128"
        receipt_epoch:
          type: integer
          minimum: 1
        sequence:
          type: integer
          minimum: 0
        chain_hash:
          $ref: "#/components/schemas/SHA256Digest"
        public_key_sha256:
          $ref: "#/components/schemas/SHA256Digest"
    ExecutorEvidenceRollbackFinding:
      type: object
      additionalProperties: false
      description: |
        The compared and observed heads use the same receipt identity, and the
        observed sequence is lower than the compared sequence.
      required: [kind, detected_at, compared_head, observed_head]
      properties:
        kind:
          type: string
          enum: [rollback]
        detected_at:
          type: string
          format: date-time
        compared_head:
          allOf:
            - $ref: "#/components/schemas/ExecutorEvidenceHead"
          description: Exact controller checkpoint against which the observed head was evaluated.
        observed_head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
    ExecutorEvidenceEquivocationFinding:
      type: object
      additionalProperties: false
      description: |
        The compared and observed heads use the same receipt identity. The
        observed sequence is at or above the compared sequence; heads at the
        same sequence have different chain hashes.
      required: [kind, detected_at, compared_head, observed_head]
      properties:
        kind:
          type: string
          enum: [equivocation]
        detected_at:
          type: string
          format: date-time
        compared_head:
          allOf:
            - $ref: "#/components/schemas/ExecutorEvidenceHead"
          description: Exact controller checkpoint against which the observed head was evaluated.
        observed_head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
    ExecutorEvidenceStatus:
      description: |
        `head` is the latest last-good controller checkpoint.
        `finding.compared_head` is the exact checkpoint used to classify
        `finding.observed_head` as rollback or equivocation. `head` can be later
        than `compared_head` when a concurrently verified historical conflict
        is recorded. It must use the same receipt identity, cannot precede
        `compared_head`, and must have the same hash when both sequences are
        equal. `finding.detected_at` may precede `witnessed_at` only when `head`
        is later than `compared_head`. `unwitnessed` carries none of these
        heads.
      oneOf:
        - $ref: "#/components/schemas/ExecutorEvidenceStatusUnwitnessed"
        - $ref: "#/components/schemas/ExecutorEvidenceStatusCurrent"
        - $ref: "#/components/schemas/ExecutorEvidenceStatusRollbackDetected"
        - $ref: "#/components/schemas/ExecutorEvidenceStatusEquivocationDetected"
      discriminator:
        propertyName: state
        mapping:
          unwitnessed: "#/components/schemas/ExecutorEvidenceStatusUnwitnessed"
          current: "#/components/schemas/ExecutorEvidenceStatusCurrent"
          rollback_detected: "#/components/schemas/ExecutorEvidenceStatusRollbackDetected"
          equivocation_detected: "#/components/schemas/ExecutorEvidenceStatusEquivocationDetected"
    ExecutorEvidenceWitnessedStatus:
      oneOf:
        - $ref: "#/components/schemas/ExecutorEvidenceStatusCurrent"
        - $ref: "#/components/schemas/ExecutorEvidenceStatusRollbackDetected"
        - $ref: "#/components/schemas/ExecutorEvidenceStatusEquivocationDetected"
      discriminator:
        propertyName: state
        mapping:
          current: "#/components/schemas/ExecutorEvidenceStatusCurrent"
          rollback_detected: "#/components/schemas/ExecutorEvidenceStatusRollbackDetected"
          equivocation_detected: "#/components/schemas/ExecutorEvidenceStatusEquivocationDetected"
    ExecutorEvidenceStatusUnwitnessed:
      type: object
      additionalProperties: false
      required: [state]
      properties:
        state:
          type: string
          enum: [unwitnessed]
    ExecutorEvidenceStatusCurrent:
      type: object
      additionalProperties: false
      required: [state, head, witnessed_at]
      properties:
        state:
          type: string
          enum: [current]
        head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
        witnessed_at:
          type: string
          format: date-time
    ExecutorEvidenceStatusRollbackDetected:
      type: object
      additionalProperties: false
      required: [state, head, witnessed_at, finding]
      properties:
        state:
          type: string
          enum: [rollback_detected]
        head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
        witnessed_at:
          type: string
          format: date-time
        finding:
          $ref: "#/components/schemas/ExecutorEvidenceRollbackFinding"
    ExecutorEvidenceStatusEquivocationDetected:
      type: object
      additionalProperties: false
      required: [state, head, witnessed_at, finding]
      properties:
        state:
          type: string
          enum: [equivocation_detected]
        head:
          $ref: "#/components/schemas/ExecutorEvidenceHead"
        witnessed_at:
          type: string
          format: date-time
        finding:
          $ref: "#/components/schemas/ExecutorEvidenceEquivocationFinding"
    SHA256Digest:
      type: string
      pattern: '^sha256:[0-9a-f]{64}$'
    Identifier128:
      type: string
