  /v1/operations/summary:
    get:
      tags: [operations]
      operationId: getControlOperationsSummary
      summary: Summarize visible fleet operations
      description: |
        Derives capacity, command, evidence, and attention counts from retained
        controller state without mutating it. The response is an observation,
        not execution authority or workflow state: reading it does not
        acknowledge an item, retry a command, or resolve a finding.

        A site administrator receives a site-wide view when `tenant_id` is
        omitted and one tenant projection when it is present. A tenant operator
        receives its own tenant projection whether `tenant_id` is omitted or
        names that tenant; another tenant is hidden as not found. Site-wide
        capacity includes the retained tenant count and global limits. A tenant
        projection uses per-tenant limits and omits tenant capacity.

        Query parameters must be known, non-empty, and occur exactly once.
      parameters:
        - $ref: "#/components/parameters/OperationsTenantID"
      responses:
        "200":
          description: A read-only summary generated from the caller's visible projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationsSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/operations/attention:
    get:
      tags: [operations]
      operationId: listControlAttention
      summary: List visible action-required facts
      description: |
        Deterministically derives bounded attention items from retained state
        and configured freshness and capacity thresholds. Items are facts, not
        mutable tickets: listing them does not acknowledge, assign, close, or
        retry anything. An item can appear or disappear as retained state and
        time change. Its ID remains stable for the same tenant, reason, and
        resource identity across queries and controller restarts.

        Site administrators may request the site-wide view or one tenant
        projection. Site-wide node and command facts are still projected per
        tenant, so a multi-tenant node can produce one item for each affected
        tenant. Tenant operators can see only their own projection; another
        tenant is hidden as not found.

        `cursor` is opaque and bound to this endpoint, the caller's effective
        site-wide or tenant projection, and the `reason` filter. Reusing it
        across projections or with a changed filter returns `400`. It contains
        no bearer credential, token MAC, command payload, or result text. A page
        can contain fewer items than `limit` to keep the encoded response within
        1 MiB. Query parameters must be known, non-empty, and occur exactly once.
      parameters:
        - $ref: "#/components/parameters/OperationsTenantID"
        - $ref: "#/components/parameters/AttentionReasonFilter"
        - $ref: "#/components/parameters/OperationsCursor"
        - $ref: "#/components/parameters/OperationsLimit"
      responses:
        "200":
          description: A bounded page of derived attention facts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttentionPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/operations/agents:
    get:
      tags: [operations]
      operationId: listControlAgentInventory
      summary: List observed agent runtimes
      description: |
        Correlates signed Executor command identity with the last bounded,
        successful node observation for each runtime and instance generation.
        This is observed state,
        not desired state: reading it does not schedule, retry, start, stop, or
        otherwise mutate a workload. A later failed command remains visible as
        the latest operation without erasing the last successful workload
        status.

        The projection excludes signed command bytes, private or public task
        authority, reusable credentials, relay endpoints, error text, and raw
        result bodies. It includes only non-secret runtime identity, lifecycle
        metadata, admission digests, and logical route or connector IDs.

        Site administrators may request the site-wide view or one tenant
        projection. Tenant operators can see only their own projection;
        another tenant is hidden as not found. `cursor` is opaque and bound to
        this endpoint, the effective projection, `node_id`, and `status`. A page
        can contain fewer records than `limit` to keep the encoded response
        within 1 MiB. Query parameters must be known, non-empty, and occur
        exactly once.
      parameters:
        - $ref: "#/components/parameters/OperationsTenantID"
        - $ref: "#/components/parameters/OperationsNodeID"
        - $ref: "#/components/parameters/AgentObservedStatusFilter"
        - $ref: "#/components/parameters/OperationsCursor"
        - $ref: "#/components/parameters/OperationsLimit"
      responses:
        "200":
          description: A bounded page of observed agent runtimes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInventoryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/operations/commands:
    get:
      tags: [operations]
      operationId: listControlCommandInventory
      summary: List visible command metadata
      description: |
        Returns bounded delivery metadata without command payload bytes or
        node-controlled result text. In particular, this inventory excludes the
        signed DSSE command, runtime references, reported status text, error
        codes, free-form result errors, and every other terminal result field.
        Reading it does not reclaim a lease, retry a command, or otherwise
        mutate delivery state.

        A site administrator may request the site-wide inventory or one tenant
        projection. A tenant operator receives only its own commands; another
        tenant is hidden as not found. `terminal_status` is valid only when
        `state=terminal`.

        `cursor` is opaque and bound to this endpoint, the caller's effective
        site-wide or tenant projection, and the `node_id`, `state`, and
        `terminal_status` filters. Reusing it across projections or with any
        changed filter returns `400`. It contains no bearer credential, command
        payload, or result text. A page can contain fewer records than `limit`
        to keep the encoded response within 1 MiB. Query parameters must be
        known, non-empty, and occur exactly once.
      parameters:
        - $ref: "#/components/parameters/OperationsTenantID"
        - $ref: "#/components/parameters/OperationsNodeID"
        - $ref: "#/components/parameters/CommandStateFilter"
        - $ref: "#/components/parameters/TerminalStatusFilter"
        - $ref: "#/components/parameters/OperationsCursor"
        - $ref: "#/components/parameters/OperationsLimit"
      responses:
        "200":
          description: A bounded, metadata-only command page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandInventoryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/operations/credentials:
    get:
      tags: [operations]
      operationId: listControlCredentialInventory
      summary: List visible credential metadata
      description: |
        Returns only the durable, non-secret half of visible operator and node
        credentials. Bearer values, token MACs, authentication keys, and other
        reproducible secret material are never returned.

        A site administrator may request the site-wide inventory or one tenant
        projection. A tenant projection excludes site-administrator
        credentials, includes tenant operators bound to that tenant, and
        includes node credentials bound to that tenant. A multi-tenant node
        credential is projected to only the requested tenant instead of
        revealing its other bindings. A tenant outside the caller's scope is
        hidden as not found.

        `role` and `node_id` cannot be combined. `kind=node` cannot be combined
        with `role`, and `kind=operator` cannot be combined with `node_id`.

        `cursor` is opaque and bound to this endpoint, the caller's effective
        site-wide or tenant projection, and the `kind`, `role`, `node_id`, and
        `revoked` filters. Reusing it across projections or with any changed
        filter returns `400`. It contains no bearer credential, token MAC, or
        other reproducible secret. A page can contain fewer records than
        `limit` to keep the encoded response within 1 MiB. Query parameters
        must be known, non-empty, and occur exactly once.
      parameters:
        - $ref: "#/components/parameters/OperationsTenantID"
        - $ref: "#/components/parameters/CredentialKindFilter"
        - $ref: "#/components/parameters/CredentialRoleFilter"
        - $ref: "#/components/parameters/OperationsNodeID"
        - $ref: "#/components/parameters/CredentialRevokedFilter"
        - $ref: "#/components/parameters/OperationsCursor"
        - $ref: "#/components/parameters/OperationsLimit"
      responses:
        "200":
          description: A bounded page of non-secret credential metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialInventoryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /metrics:
    get:
      tags: [metrics]
      operationId: getControlMetrics
      summary: Read optional authenticated Prometheus metrics
      description: |
        Exposes the same read-only operations summary as fixed-cardinality
        Prometheus gauges. This route exists only when metrics are explicitly
        enabled. When disabled, the controller treats `/metrics` as an unknown
        route and returns its normal JSON 404 response before authentication.

        When enabled, one valid operator bearer is required. Tenant projection
        follows the operations endpoints: a site administrator can request the
        site-wide view or one tenant, while a tenant operator receives only its
        own tenant and sees another tenant as not found.

        Labels use only closed sets: `scope` is `site` or `tenant`; capacity
        `resource`, command `state` and `status`, evidence `status`, and
        attention `reason` and `severity` use the fixed values documented by
        the operations schemas. Tenant, node, credential, command, request, and
        other resource identifiers are never metric labels.

        Query parameters must be known, non-empty, and occur exactly once.
      parameters:
        - $ref: "#/components/parameters/OperationsTenantID"
      responses:
        "200":
          description: Prometheus text exposition for the caller's visible projection.
          content:
            "text/plain; version=0.0.4; charset=utf-8":
              schema:
                $ref: "#/components/schemas/ControlPrometheusMetrics"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Metrics are disabled before authentication, the requested tenant does not exist, or the tenant is outside the caller's scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /executor-uplink/poll:
    post:
      tags: [executor-uplink]
      operationId: pollControlDeliveries
      summary: Lease commands for an authenticated node
      description: |
        The node bearer must match the body node ID. Pending and expired leases
        are claimed durably before the response. A reclaimed delivery has a
        higher delivery generation, which fences a late report from an older
        lease. `delivery_id` is `delivery-` plus lowercase hexadecimal SHA-256
        of the UTF-8 bytes `steward-control-delivery-v1\0<tenant_id>\0<node_id>\0<command_id>`.
        The node recomputes it after verifying the signed command. The complete
        encoded response is capped at 1 MiB before any lease is published.
        Protocol 3 retains only the bounded lifecycle result. Protocol 4 is an
        explicit opt-in that can also return the complete bounded admission
        projection; a lease is durably pinned to the requested protocol so a
        report from another protocol cannot close it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutorPollRequest"
      responses:
        "200":
          description: Zero or more independently verifiable deliveries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutorPollResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /executor-uplink/report:
    post:
      tags: [executor-uplink]
      operationId: reportControlDelivery
      summary: Record one terminal node observation
      description: |
        The delivery ID, generation, command ID, and digest fence the report.
        `applied=false` acknowledges a stale or byte-identical duplicate report;
        it does not ask the node to execute the command again. A protocol-4
        admission projection is retained only for an unambiguous successful
        `admit` report and must match the exact signed runtime, claim
        generation, and instance generation stored with the command.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutorReport"
      responses:
        "200":
          description: The terminal report was applied or safely recognized as stale or duplicate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutorReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /evidence-uplink/poll:
    post:
      tags: [evidence-uplink]
      operationId: pollExecutorEvidenceCheckpoint
      summary: Read the witnessed checkpoint and obtain a report challenge
      description: |
        Authenticates the node and its receipt-key identity before returning the
        last durable controller checkpoint. The challenge is stateless, bound to
        the node credential, and expires after two minutes.
        Polling never refreshes or advances durable evidence state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutorEvidencePollRequest"
      responses:
        "200":
          description: The current checkpoint and a short-lived report challenge.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutorEvidencePollResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /evidence-uplink/report:
    post:
      tags: [evidence-uplink]
      operationId: reportExecutorEvidenceCheckpoint
      summary: Verify and retain an Executor evidence checkpoint
      description: |
        Verifies the challenge-bound receipt-key signature and every submitted
        signed frame before advancing the durable checkpoint. A byte-identical
        retry is acknowledged without another mutation. An authenticated local
        head behind, or conflicting with, the checkpoint evaluated for that
        report records a bounded rollback or equivocation finding and stops
        later advancement. The retained status may already contain a later
        valid checkpoint when a concurrently verified historical conflict is
        durably recorded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutorEvidenceReport"
      responses:
        "200":
          description: The report was applied or safely recognized as an exact no-op.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutorEvidenceReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Steward control credential
  parameters:
    ConsoleAsset:
      name: asset
      in: path
      required: true
      description: |
        Exact committed JavaScript or CSS basename. It is at most 128
        characters, has no path delimiter, does not begin with `.`, and uses
        only ASCII letters, digits, `.`, `_`, and `-`.
      schema:
        type: string
        minLength: 5
        maxLength: 128
        pattern: '^[A-Za-z0-9_-][A-Za-z0-9._-]*[.](css|js)$'
    TenantID:
      name: tenant_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Identifier128"
    NodeID:
      name: node_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Identifier128"
    CredentialID:
      name: credential_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Identifier128"
    CommandID:
      name: command_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Identifier256"
    DeploymentID:
      name: deployment_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Identifier128"
    CaptureID:
      name: capture_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Identifier128"
    After:
      name: after
      in: query
      required: false
      description: Return records whose ID is lexicographically greater than this cursor.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum records to return. Defaults to 100.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    OperationsTenantID:
      name: tenant_id
      in: query
      required: false
      allowEmptyValue: false
      description: |
        Optional exact tenant projection. A site administrator can omit it for
        a site-wide view or name one tenant. A tenant operator can omit it or
        name its own tenant; another tenant is hidden as not found.
      schema:
        $ref: "#/components/schemas/Identifier128"
    OperationsNodeID:
      name: node_id
      in: query
      required: false
      allowEmptyValue: false
      description: Return only records for this exact node identity.
      schema:
        $ref: "#/components/schemas/Identifier128"
    OperationsCursor:
      name: cursor
      in: query
      required: false
      allowEmptyValue: false
      description: |
        Opaque unpadded base64url continuation cursor. It is bound to one
        inventory endpoint, one effective site-wide or tenant projection, and
        every endpoint filter. Cross-projection or changed-filter reuse returns
        `400`. The cursor contains no bearer credential, token MAC, command
        payload, or result text.
      schema:
        $ref: "#/components/schemas/OperationsCursor"
    OperationsLimit:
      name: limit
      in: query
      required: false
      allowEmptyValue: false
      description: |
        Maximum records to return. Defaults to 100. The query value must be the
        canonical decimal form of an integer from 1 through 500, without a sign
        or leading zero.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    AttentionReasonFilter:
      name: reason
      in: query
      required: false
      allowEmptyValue: false
      description: Return only attention items with this exact derived reason.
      schema:
        $ref: "#/components/schemas/AttentionReason"
    AgentObservedStatusFilter:
      name: status
      in: query
      required: false
      allowEmptyValue: false
      description: Return only runtimes with this last successful observed status.
      schema:
        $ref: "#/components/schemas/AgentObservedStatus"
    CommandStateFilter:
      name: state
      in: query
      required: false
      allowEmptyValue: false
      description: Return only commands in this durable delivery state.
      schema:
        $ref: "#/components/schemas/CommandLifecycleState"
    TerminalStatusFilter:
      name: terminal_status
      in: query
      required: false
      allowEmptyValue: false
      description: |
        Return only terminal commands with this node-reported delivery outcome.
        This filter is valid only when `state=terminal`.
      schema:
        $ref: "#/components/schemas/TerminalCommandStatus"
    CredentialKindFilter:
      name: kind
      in: query
      required: false
      allowEmptyValue: false
      description: |
        Return only operator or node credentials. `node` cannot be combined
        with `role`; `operator` cannot be combined with `node_id`.
      schema:
        $ref: "#/components/schemas/ControlCredentialKind"
    CredentialRoleFilter:
      name: role
      in: query
      required: false
      allowEmptyValue: false
      description: |
        Return only operator credentials with this role. It cannot be combined
        with `node_id` or `kind=node`.
      schema:
        $ref: "#/components/schemas/ControlOperatorRole"
    CredentialRevokedFilter:
      name: revoked
      in: query
      required: false
      allowEmptyValue: false
      description: |
        Return only credentials with this revocation state. When omitted, both
        active and revoked credentials are returned. When present, the raw
        query value must be the lowercase literal `true` or `false`.
      schema:
        type: boolean
  responses:
    ConsoleIndex:
      description: |
        The embedded console HTML. The response is `no-store` and includes the
        console Content Security Policy, same-origin resource and opener
        policies, frame denial, restricted browser permissions, no-referrer,
        no-sniff, and no-index headers.
      headers:
        Content-Length:
          description: Exact byte length of the committed response body.
          schema:
            type: integer
            minimum: 0
            maximum: 1048576
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
      content:
        text/html:
          schema:
            type: string
            maxLength: 1048576
    ConsoleIcon:
      description: |
        The embedded console SVG icon with the same restrictive security and
        `no-store` headers as the console entry point.
      headers:
        Content-Length:
          description: Exact byte length of the committed response body.
          schema:
            type: integer
            minimum: 0
            maximum: 1048576
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
      content:
        image/svg+xml:
          schema:
            type: string
            maxLength: 1048576
    ConsoleNotices:
      description: |
        The embedded console third-party notice text with the same restrictive
        security and `no-store` headers as the console entry point.
      headers:
        Content-Length:
          description: Exact byte length of the committed response body.
          schema:
            type: integer
            minimum: 0
            maximum: 1048576
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
      content:
        text/plain:
          schema:
            type: string
            maxLength: 1048576
    ConsoleScriptOrStyle:
      description: |
        One exact embedded production script or stylesheet with the same
        restrictive security and `no-store` headers as the console entry point.
      headers:
        Content-Length:
          description: Exact byte length of the committed response body.
          schema:
            type: integer
            minimum: 0
            maximum: 1048576
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
      content:
        text/javascript:
          schema:
            type: string
            maxLength: 1048576
        text/css:
          schema:
            type: string
            maxLength: 1048576
    ConsoleHead:
      description: |
        Metadata for one embedded console asset. The response has no body and
        carries the matching GET response's Content-Type, exact Content-Length,
        restrictive security headers, and `Cache-Control: no-store`.
      headers:
        Content-Length:
          description: Exact byte length the matching GET would return.
          schema:
            type: integer
            minimum: 0
            maximum: 1048576
        Content-Type:
          schema:
            type: string
            enum:
              - text/html; charset=utf-8
              - image/svg+xml
              - text/plain; charset=utf-8
              - text/javascript; charset=utf-8
              - text/css; charset=utf-8
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
    BadRequest:
      description: The path, query, strict JSON body, or requested record violates the control contract.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: The bearer is missing, malformed, unknown, or revoked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: The operator role does not authorize this site-wide operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The resource does not exist or is outside the caller's tenant scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MethodNotAllowed:
      description: The HTTP method is not allowed for this route.
      headers:
        Allow:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The request conflicts with retained identity, enrollment, delivery, or terminal state.
      headers:
        Retry-After:
          description: Present only when the same request is safe to retry after at least this many seconds.
          schema:
            type: integer
            minimum: 1
            maximum: 3600
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    EnrollmentExpired:
      description: The one-time enrollment capability expired before exchange.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: The request body exceeds 1 MiB.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnsupportedMediaType:
      description: Content-Type is not application/json.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: The controller could not complete the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unavailable:
      description: Durable state is unavailable or a configured capacity bound is exhausted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    Health:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    Readiness:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ready]
    OperationsCursor:
      type: string
      minLength: 1
      maxLength: 5462
      pattern: '^[A-Za-z0-9_-]+$'
      description: |
        Opaque canonical unpadded base64url cursor. Cursors are bound to an
        endpoint, the effective site-wide or tenant projection, and every
        endpoint filter. They contain no bearer credential, token MAC, command
        payload, or result text.
    CommandLifecycleState:
      type: string
      enum: [pending, leased, terminal]
    TerminalCommandStatus:
      type: string
      enum: [done, failed, rejected, outcome_unknown]
    ControlCredentialKind:
      type: string
      enum: [operator, node]
    ControlOperatorRole:
      type: string
      enum: [site_admin, tenant_operator]
    CapacityResource:
      type: string
      enum: [tenants, nodes, credentials, enrollments, commands]
    AttentionReason:
      type: string
      enum:
        - node_never_seen
        - node_stale
        - evidence_unwitnessed
        - evidence_stale
        - rollback_detected
        - equivocation_detected
        - command_pending_overdue
        - command_lease_expired
        - command_failed
        - command_outcome_unknown
        - capacity_warning
    AttentionSeverity:
      type: string
      enum: [warning, critical]
    AttentionResource:
      type: string
      enum: [node, evidence, command, capacity]
    OperationsSummary:
      type: object
      additionalProperties: false
      description: |
        Read-only fleet facts derived at `generated_at`. `tenant_id` is omitted
        for the site-wide projection and present for a tenant projection.
      required: [generated_at, capacity, commands, evidence, attention]
      properties:
        generated_at:
          type: string
          format: date-time
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        capacity:
          type: array
          minItems: 4
          maxItems: 5
          items:
            $ref: "#/components/schemas/CapacityUsage"
        commands:
          $ref: "#/components/schemas/CommandSummary"
        evidence:
          $ref: "#/components/schemas/EvidenceSummary"
        attention:
          $ref: "#/components/schemas/AttentionSummary"
    CapacityUsage:
      type: object
      additionalProperties: false
      required: [resource, used, limit, warning]
      properties:
        resource:
          $ref: "#/components/schemas/CapacityResource"
        used:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        warning:
          type: boolean
          description: True when usage is at or above the configured percentage of the limit.
    CommandSummary:
      type: object
      additionalProperties: false
      required: [total, pending, leased, terminal, done, failed, rejected, outcome_unknown]
      properties:
        total:
          type: integer
          minimum: 0
        pending:
          type: integer
          minimum: 0
        leased:
          type: integer
          minimum: 0
        terminal:
          type: integer
          minimum: 0
        done:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
        rejected:
          type: integer
          minimum: 0
        outcome_unknown:
          type: integer
          minimum: 0
    EvidenceSummary:
      type: object
      additionalProperties: false
      required:
        - nodes
        - active_nodes
        - witnessed
        - unwitnessed
        - current
        - stale
        - rollback_detected
        - equivocation_detected
      properties:
        nodes:
          type: integer
          minimum: 0
        active_nodes:
          type: integer
          minimum: 0
        witnessed:
          type: integer
          minimum: 0
        unwitnessed:
          type: integer
          minimum: 0
        current:
          type: integer
          minimum: 0
        stale:
          type: integer
          minimum: 0
          description: |
            Active witnessed nodes whose last authenticated evidence report is
            unknown or at least the configured stale threshold old. Report
            recency is intentionally conservative after controller restart.
        rollback_detected:
          type: integer
          minimum: 0
        equivocation_detected:
          type: integer
          minimum: 0
    AttentionSummary:
      type: object
      additionalProperties: false
      required: [total, warnings, critical, counts]
      properties:
        total:
          type: integer
          minimum: 0
        warnings:
          type: integer
          minimum: 0
        critical:
          type: integer
          minimum: 0
        counts:
          type: array
          maxItems: 11
          items:
            $ref: "#/components/schemas/AttentionCount"
    AttentionCount:
      type: object
      additionalProperties: false
      required: [reason, severity, count]
      properties:
        reason:
          $ref: "#/components/schemas/AttentionReason"
        severity:
          $ref: "#/components/schemas/AttentionSeverity"
        count:
          type: integer
          minimum: 1
    AttentionPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/AttentionItem"
        next_cursor:
          $ref: "#/components/schemas/OperationsCursor"
    AttentionItem:
      type: object
      additionalProperties: false
      description: |
        One derived action-required fact. This is not mutable workflow state.
        Resource-specific fields are present only when applicable.
      required: [id, reason, severity, resource]
      properties:
        id:
          type: string
          minLength: 74
          maxLength: 74
          pattern: '^attention-[0-9a-f]{64}$'
          description: Stable identity for the same tenant, reason, and resource identity.
        reason:
          $ref: "#/components/schemas/AttentionReason"
        severity:
          $ref: "#/components/schemas/AttentionSeverity"
        resource:
          $ref: "#/components/schemas/AttentionResource"
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        command_id:
          $ref: "#/components/schemas/Identifier256"
        capacity_resource:
          $ref: "#/components/schemas/CapacityResource"
        since:
          type: string
          format: date-time
        state:
          $ref: "#/components/schemas/CommandLifecycleState"
        status:
          $ref: "#/components/schemas/TerminalCommandStatus"
        used:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
    AgentInventoryPage:
      type: object
      additionalProperties: false
      required: [agents]
      properties:
        agents:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/AgentMetadata"
        next_cursor:
          $ref: "#/components/schemas/OperationsCursor"
    AgentObservedStatus:
      type: string
      enum: [unknown, provisioning, running, stopped, hibernated]
      description: Last unambiguous successful workload status reported by Executor.
    AgentMetadata:
      type: object
      additionalProperties: false
      description: |
        Non-secret observed state for one signed runtime identity. Latest
        command fields describe delivery activity and may report failure while
        `observed_status` preserves the last successful workload observation.
      required:
        - tenant_id
        - node_id
        - runtime_ref
        - instance_generation
        - observed_status
        - latest_command_id
        - latest_command_kind
        - latest_command_state
        - created_at
        - updated_at
      properties:
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        runtime_ref:
          type: string
          minLength: 73
          maxLength: 73
          pattern: '^executor-[a-f0-9]{64}$'
        instance_generation:
          type: integer
          format: int64
          minimum: 1
        claim_generation:
          type: integer
          format: int64
          minimum: 1
        observed_status:
          $ref: "#/components/schemas/AgentObservedStatus"
        latest_command_id:
          $ref: "#/components/schemas/Identifier256"
        latest_command_kind:
          type: string
          minLength: 1
          maxLength: 64
        latest_command_state:
          $ref: "#/components/schemas/CommandLifecycleState"
        latest_terminal_status:
          $ref: "#/components/schemas/TerminalCommandStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        capsule_digest:
          $ref: "#/components/schemas/SHA256Digest"
        policy_digest:
          $ref: "#/components/schemas/SHA256Digest"
        service_id:
          $ref: "#/components/schemas/Identifier128"
        egress_route_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Identifier128"
        connector_ids:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Identifier128"
    CommandInventoryPage:
      type: object
      additionalProperties: false
      required: [commands]
      properties:
        commands:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/CommandMetadata"
        next_cursor:
          $ref: "#/components/schemas/OperationsCursor"
    CommandMetadata:
      type: object
      additionalProperties: false
      description: |
        Bounded delivery metadata. The signed command bytes and terminal result
        object, including runtime references and free-form errors, are excluded.
      required:
        - tenant_id
        - node_id
        - id
        - delivery_id
        - digest
        - state
        - delivery_generation
        - created_at
      properties:
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        id:
          $ref: "#/components/schemas/Identifier256"
        delivery_id:
          $ref: "#/components/schemas/Identifier256"
        digest:
          $ref: "#/components/schemas/SHA256Digest"
        state:
          $ref: "#/components/schemas/CommandLifecycleState"
        delivery_generation:
          type: integer
          format: int64
          minimum: 0
        lease_until:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        terminal_status:
          $ref: "#/components/schemas/TerminalCommandStatus"
        completed_at:
          type: string
          format: date-time
    CredentialInventoryPage:
      type: object
      additionalProperties: false
      required: [credentials]
      properties:
        credentials:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/CredentialMetadata"
        next_cursor:
          $ref: "#/components/schemas/OperationsCursor"
    CredentialMetadata:
      type: object
      additionalProperties: false
      description: |
        Durable non-secret credential metadata. Bearer values and token MACs
        are never included. Operator records use `role` and, for tenant
        operators, `tenant_id`. Node records use `tenant_ids`, `node_id`, and
        `audience`. A tenant projection narrows a multi-tenant node credential
        to the requested tenant.
      required: [id, kind, created_at, revoked]
      properties:
        id:
          $ref: "#/components/schemas/Identifier128"
        kind:
          $ref: "#/components/schemas/ControlCredentialKind"
        role:
          $ref: "#/components/schemas/ControlOperatorRole"
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        tenant_ids:
          type: array
          minItems: 1
          maxItems: 128
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        audience:
          type: string
          enum: [executor]
        request_id:
          allOf:
            - $ref: "#/components/schemas/Identifier128"
          description: Operator issuance request identity, when the credential was issued recoverably.
        created_at:
          type: string
          format: date-time
        revoked:
          type: boolean
        revoked_at:
          type: string
          format: date-time
          description: Present exactly when `revoked` is true.
    ControlPrometheusMetrics:
      type: string
      maxLength: 1048576
      description: |
        Prometheus text exposition version 0.0.4. The endpoint emits only gauge
        series with fixed label domains:

        - `steward_control_capacity_used`,
          `steward_control_capacity_limit`, and
          `steward_control_capacity_warning` use `scope` and `resource`.
        - `steward_control_commands` uses `scope`, `state`, and `status`.
          Emitted combinations are `all/all`, `pending/none`, `leased/none`,
          and `terminal` with `all`, `done`, `failed`, `rejected`, or
          `outcome_unknown`.
        - `steward_control_evidence_nodes` uses `scope` and `status`, where
          status is `all`, `active`, `witnessed`, `unwitnessed`, `current`,
          `stale`, `rollback_detected`, or `equivocation_detected`.
        - `steward_control_attention` uses `scope`, `reason`, and `severity`.

        `scope` is only `site` or `tenant`. No tenant, node, credential,
        command, request, or other resource identifier is emitted as a label.
    CreateTenantRequest:
      type: object
      additionalProperties: false
      required: [tenant_id]
      properties:
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
    Tenant:
      type: object
      additionalProperties: false
      required: [tenant_id, state, created_at]
      properties:
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        state:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
    TenantList:
      type: object
      additionalProperties: false
      required: [tenants]
      properties:
        tenants:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/Tenant"
        next_after:
          $ref: "#/components/schemas/Identifier128"
    IssueOperatorRequest:
      type: object
      additionalProperties: false
      required: [request_id, role]
      properties:
        request_id:
          $ref: "#/components/schemas/Identifier128"
        role:
          type: string
          enum: [site_admin, tenant_operator]
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
      oneOf:
        - properties:
            role:
              type: string
              enum: [site_admin]
          not:
            required: [tenant_id]
        - required: [tenant_id]
          properties:
            role:
              type: string
              enum: [tenant_operator]
    IssuedOperator:
      type: object
      additionalProperties: false
      required: [credential_id, role, token, created_at]
      properties:
        credential_id:
          $ref: "#/components/schemas/Identifier128"
        role:
          type: string
          enum: [site_admin, tenant_operator]
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        token:
          type: string
          writeOnly: true
        created_at:
          type: string
          format: date-time
    CreateEnrollmentRequest:
      type: object
      additionalProperties: false
      required: [request_id, node_id, tenant_ids, ttl_seconds]
      properties:
        request_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        tenant_ids:
          type: array
          minItems: 1
          maxItems: 128
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Identifier128"
        ttl_seconds:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
    Enrollment:
      type: object
      additionalProperties: false
      required: [controller_instance_id, enrollment_id, enrollment_token, node_id, tenant_ids, expires_at]
      properties:
        controller_instance_id:
          $ref: "#/components/schemas/Identifier128"
        enrollment_id:
          $ref: "#/components/schemas/Identifier128"
        enrollment_token:
          type: string
          writeOnly: true
        node_id:
          $ref: "#/components/schemas/Identifier128"
        tenant_ids:
          type: array
          items:
            $ref: "#/components/schemas/Identifier128"
        expires_at:
          type: string
          format: date-time
    ExchangeEnrollmentRequest:
      type: object
      additionalProperties: false
      required: [enrollment_token, request_id, evidence_identity_proof]
      properties:
        enrollment_token:
          type: string
        request_id:
          $ref: "#/components/schemas/Identifier128"
        evidence_identity_proof:
          $ref: "#/components/schemas/ExecutorEvidenceIdentityProofV1"
    ExecutorEvidenceIdentityProofV1:
      type: object
      additionalProperties: false
      required: [claim, signature_base64]
      properties:
        claim:
          $ref: "#/components/schemas/ExecutorEvidenceIdentityClaimV1"
        signature_base64:
          type: string
          description: Canonical base64 encoding of a 64-byte Ed25519 signature.
          minLength: 88
          maxLength: 88
          pattern: '^[A-Za-z0-9+/]{86}==$'
    ExecutorEvidenceIdentityClaimV1:
      type: object
      additionalProperties: false
      required:
        - protocol_version
        - controller_instance_id
        - enrollment_id
        - control_node_id
        - stream
        - receipt_node_id
        - receipt_epoch
        - public_key_base64
        - public_key_sha256
      properties:
        protocol_version:
          type: integer
          enum: [1]
        controller_instance_id:
          $ref: "#/components/schemas/Identifier128"
        enrollment_id:
          $ref: "#/components/schemas/Identifier128"
        control_node_id:
          $ref: "#/components/schemas/Identifier128"
        stream:
          type: string
          enum: [executor]
        receipt_node_id:
          $ref: "#/components/schemas/Identifier128"
        receipt_epoch:
          type: integer
          format: int64
          enum: [1]
        public_key_base64:
          type: string
          description: Canonical base64 encoding of a 32-byte Ed25519 public key.
          minLength: 44
          maxLength: 44
          pattern: '^[A-Za-z0-9+/]{43}=$'
        public_key_sha256:
          $ref: "#/components/schemas/SHA256Digest"
    NodeCredential:
      type: object
      additionalProperties: false
      required: [version, scope, node_id, credential]
      properties:
        version:
          type: integer
          enum: [2]
        scope:
          type: string
          enum: [node]
        node_id:
          $ref: "#/components/schemas/Identifier128"
        credential:
          type: string
          writeOnly: true
    NodeCredentialRevocation:
      type: object
      additionalProperties: false
      required: [credential_id, node_id, revoked]
      properties:
        credential_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        revoked:
          type: boolean
    Node:
      type: object
      additionalProperties: false
      required: [node_id, tenant_ids, capabilities, state, created_at]
      properties:
        node_id:
          $ref: "#/components/schemas/Identifier128"
        tenant_ids:
          type: array
          maxItems: 128
          items:
            $ref: "#/components/schemas/Identifier128"
        capabilities:
          type: array
          maxItems: 64
          items:
            $ref: "#/components/schemas/Identifier128"
        state:
          type: string
          enum: [active, revoked]
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    NodeList:
      type: object
      additionalProperties: false
      required: [nodes]
      properties:
        nodes:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/Node"
        next_after:
          $ref: "#/components/schemas/Identifier128"
    NodeRevocation:
      type: object
      additionalProperties: false
      required: [node_id, revoked_credentials]
      properties:
        node_id:
          $ref: "#/components/schemas/Identifier128"
        revoked_credentials:
          type: integer
          minimum: 0
    DeploymentApplyRequest:
      type: object
      additionalProperties: false
      required:
        - generation
        - agent_name
        - bundle_digest
        - capsule_dsse_base64
        - delegation_dsse_base64
      properties:
        generation:
          type: integer
          format: int64
          minimum: 1
          description: Monotonically increasing desired deployment generation.
        expected_revision:
          type: integer
          format: int64
          minimum: 1
          description: Required when changing an existing deployment; omit on create.
        agent_name:
          $ref: "#/components/schemas/Identifier128"
        bundle_digest:
          $ref: "#/components/schemas/SHA256Digest"
        capsule_dsse_base64:
          type: string
          format: byte
          minLength: 4
          maxLength: 1048576
          description: Canonical standard-base64 encoding of the publisher-signed capsule DSSE JSON.
        delegation_dsse_base64:
          type: string
          format: byte
          minLength: 4
          maxLength: 87384
          description: Canonical standard-base64 encoding of the tenant-signed controller delegation DSSE JSON.
    DeploymentDeleteRequest:
      type: object
      additionalProperties: false
      required: [expected_revision]
      properties:
        expected_revision:
          type: integer
          format: int64
          minimum: 1
    DeploymentInstance:
      type: object
      additionalProperties: false
      required: [instance_id, lineage_id, generation, phase, transitioned_at]
      properties:
        instance_id:
          $ref: "#/components/schemas/Identifier256"
        lineage_id:
          $ref: "#/components/schemas/Identifier256"
        generation:
          type: integer
          format: int64
          minimum: 1
        node_id:
          $ref: "#/components/schemas/Identifier128"
        phase:
          type: string
          enum: [pending, admitting, starting, running, stopping, destroying, removed, failed]
        command_id:
          $ref: "#/components/schemas/Identifier256"
        command_operation:
          type: string
          enum: [admit, start, read, stop, destroy]
        command_sequence:
          type: integer
          format: int64
          minimum: 1
        attempts:
          type: integer
          format: int32
          minimum: 1
        last_error:
          type: string
          maxLength: 1024
          description: >-
            A stable retryable blocked reason (`no_eligible_node`,
            `assigned_node_unavailable`, `delegation_expired`,
            `controller_key_mismatch`, or `invalid_deployment_authority`), or a
            bounded terminal Executor error when phase is `failed`. Retryable
            reasons clear when reconciliation can enqueue or observe progress.
        transitioned_at:
          type: string
          format: date-time
    Deployment:
      type: object
      additionalProperties: false
      required:
        - tenant_id
        - deployment_id
        - generation
        - revision
        - agent_name
        - bundle_digest
        - capsule_digest
        - delegation_digest
        - delegation_id
        - controller_key_id
        - claim_generation
        - allowed_node_ids
        - delegation_expires_at
        - desired_state
        - phase
        - instances
        - created_at
        - updated_at
      properties:
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        deployment_id:
          $ref: "#/components/schemas/Identifier128"
        generation:
          type: integer
          format: int64
          minimum: 1
        revision:
          type: integer
          format: int64
          minimum: 1
        agent_name:
          $ref: "#/components/schemas/Identifier128"
        bundle_digest:
          $ref: "#/components/schemas/SHA256Digest"
        capsule_digest:
          $ref: "#/components/schemas/SHA256Digest"
        delegation_digest:
          $ref: "#/components/schemas/SHA256Digest"
        delegation_id:
          $ref: "#/components/schemas/Identifier128"
        controller_key_id:
          $ref: "#/components/schemas/Identifier256"
        claim_generation:
          type: integer
          format: int64
          minimum: 1
        allowed_node_ids:
          type: array
          minItems: 1
          maxItems: 64
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Identifier128"
        delegation_expires_at:
          type: string
          format: date-time
        desired_state:
          type: string
          enum: [running, absent]
        phase:
          type: string
          enum: [pending, reconciling, ready, stopping, removed, degraded]
        instances:
          type: array
          minItems: 1
          maxItems: 128
          items:
            $ref: "#/components/schemas/DeploymentInstance"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DeploymentList:
      type: object
      additionalProperties: false
      required: [deployments]
      properties:
        deployments:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/Deployment"
        next_after:
          $ref: "#/components/schemas/Identifier128"
    SubmitCommandRequest:
      type: object
      additionalProperties: false
      required: [command_dsse_base64]
      properties:
        command_dsse_base64:
          type: string
          format: byte
          description: Canonical standard-base64 encoding of the exact DSSE JSON bytes.
    Command:
      type: object
      additionalProperties: false
      required: [command_id, delivery_id, tenant_id, node_id, command_digest, state]
      properties:
        command_id:
          $ref: "#/components/schemas/Identifier256"
        delivery_id:
          $ref: "#/components/schemas/Identifier256"
        tenant_id:
          $ref: "#/components/schemas/Identifier128"
        node_id:
          $ref: "#/components/schemas/Identifier128"
        command_digest:
          $ref: "#/components/schemas/SHA256Digest"
        command_kind:
          type: string
          maxLength: 64
          description: |
            Operation copied from the exact DSSE command payload for
            correlation. The controller transports but does not authenticate
            the tenant signature; the node remains the command verifier.
        signed_runtime_ref:
          type: string
          maxLength: 1024
          description: Runtime reference copied from the exact DSSE command payload.
        signed_claim_generation:
          type: integer
          format: int64
          minimum: 1
          description: Claim generation copied from the exact DSSE command payload.
        signed_instance_generation:
          type: integer
          format: int64
          minimum: 1
          description: Instance generation copied from the exact DSSE command payload.
        state:
          type: string
          enum: [pending, leased, terminal]
        delivery_protocol:
          type: integer
          enum: [3, 4]
          description: Protocol selected by the node for the active or terminal delivery lease.
        delivery_generation:
          type: integer
          format: int64
          minimum: 1
        lease_expires_at:
          type: string
          format: date-time
        terminal_status:
          type: string
          enum: [done, failed, rejected, outcome_unknown]
          description: |
            Node delivery outcome, present only after the command becomes
            terminal. `done` and `rejected` are known replay-safe. `failed` and
            `outcome_unknown` remain retained and must not be retried
            automatically.
        reported_status:
          type: string
          maxLength: 64
          description: Node-local workload status. Present only after the command becomes terminal.
        error_code:
          type: string
          maxLength: 128
          description: Stable node error classification when one was reported.
        claim_generation:
          type: integer
          format: int64
          minimum: 0
          description: Signed lifecycle fence observed by the node. Present only after the command becomes terminal.
        admission_projection_state:
          type: string
          enum: [missing, present]
          description: |
            Present only for a successful terminal `admit`. `present` means a
            protocol-4 node returned the correlated projection. `missing`
            means the delivery completed without one; callers must not infer
            admission details from another field.
        activation_canary_projection_state:
          type: string
          enum: [missing, present]
          description: |
            Present only for a successful terminal `activation-canary` command.
            `present` means a protocol-4 node returned the bounded, correlated
            projection. `missing` means the command completed without one; callers
            must not infer canary qualification from another field.
        result:
          allOf:
            - $ref: "#/components/schemas/ControlCommandResult"
          description: Bounded node result details. Present only after the command becomes terminal.
    ExecutorPollRequest:
      oneOf:
        - $ref: "#/components/schemas/ExecutorPollRequestV3"
        - $ref: "#/components/schemas/ExecutorPollRequestV4"
    ExecutorPollRequestV3:
      type: object
      additionalProperties: false
      required: [protocol_version, node_id, credential_scope, capabilities]
      properties:
        protocol_version:
          type: integer
          enum: [3]
        node_id:
          $ref: "#/components/schemas/Identifier128"
        credential_scope:
          type: string
          enum: [node]
        capabilities:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Identifier128"
    ExecutorPollRequestV4:
      type: object
      additionalProperties: false
      required: [protocol_version, node_id, credential_scope, capabilities]
      properties:
        protocol_version:
          type: integer
          enum: [4]
        node_id:
          $ref: "#/components/schemas/Identifier128"
        credential_scope:
          type: string
          enum: [node]
        capabilities:
          type: array
          maxItems: 64
          uniqueItems: true
          description: |
            A node must include `activation-canary-v1` before the controller can
            lease an `activation-canary` command to it. A node includes
            `controller-delegation-v1` only when it independently verifies the
            tenant-signed bounded delegation and delegated controller signature.
          items:
            $ref: "#/components/schemas/Identifier128"
    ExecutorPollResponse:
      oneOf:
        - $ref: "#/components/schemas/ExecutorPollResponseV3"
        - $ref: "#/components/schemas/ExecutorPollResponseV4"
    ExecutorPollResponseV3:
      type: object
      additionalProperties: false
      required: [protocol_version, deliveries]
      properties:
        protocol_version:
          type: integer
          enum: [3]
        deliveries:
          type: array
          maxItems: 128
          items:
            $ref: "#/components/schemas/ExecutorDelivery"
    ExecutorPollResponseV4:
      type: object
      additionalProperties: false
      required: [protocol_version, deliveries]
      properties:
        protocol_version:
          type: integer
          enum: [4]
        deliveries:
          type: array
          maxItems: 128
          items:
            $ref: "#/components/schemas/ExecutorDelivery"
    ExecutorDelivery:
      type: object
      additionalProperties: false
      description: |
        Unsigned lease metadata around exact tenant-signed command bytes. The
        node verifies the signature and recomputes delivery_id before accepting
        this record into its durable delivery ledger.
      required: [delivery_id, delivery_generation, command_id, command_digest, command_dsse_base64]
      properties:
        delivery_id:
          $ref: "#/components/schemas/Identifier256"
        delivery_generation:
          type: integer
          format: int64
          minimum: 1
        command_id:
          $ref: "#/components/schemas/Identifier256"
        command_digest:
          $ref: "#/components/schemas/SHA256Digest"
        command_dsse_base64:
          type: string
          format: byte
    ExecutorReport:
      oneOf:
        - $ref: "#/components/schemas/ExecutorReportV3"
        - $ref: "#/components/schemas/ExecutorReportV4"
    ExecutorReportV3:
      type: object
      additionalProperties: false
      required:
        - protocol_version
        - delivery_id
        - delivery_generation
        - command_id
        - command_digest
        - status
        - reported_status
        - claim_generation
        - result
      properties:
        protocol_version:
          type: integer
          enum: [3]
        delivery_id:
          $ref: "#/components/schemas/Identifier256"
        delivery_generation:
          type: integer
          format: int64
          minimum: 1
        command_id:
          $ref: "#/components/schemas/Identifier256"
        command_digest:
          $ref: "#/components/schemas/SHA256Digest"
        status:
          type: string
          enum: [done, failed, rejected, outcome_unknown]
          description: |
            `done` proves handler success and a durable lifecycle fence.
            `rejected` proves no mutating effect could have occurred. `failed`
            is a retained fail-closed compatibility result. `outcome_unknown`
            means a mutating effect may have occurred and must not be retried
            automatically.
        reported_status:
          type: string
          maxLength: 64
        claim_generation:
          type: integer
          format: int64
          minimum: 0
        error_code:
          type: string
          maxLength: 128
        result:
          $ref: "#/components/schemas/ExecutorReportResult"
    ExecutorReportV4:
      type: object
      additionalProperties: false
      required:
        - protocol_version
        - delivery_id
        - delivery_generation
        - command_id
        - command_digest
        - status
        - reported_status
        - claim_generation
        - result
      properties:
        protocol_version:
          type: integer
          enum: [4]
        delivery_id:
          $ref: "#/components/schemas/Identifier256"
        delivery_generation:
          type: integer
          format: int64
          minimum: 1
        command_id:
          $ref: "#/components/schemas/Identifier256"
        command_digest:
          $ref: "#/components/schemas/SHA256Digest"
        status:
          type: string
          enum: [done, failed, rejected, outcome_unknown]
        reported_status:
          type: string
          maxLength: 64
        claim_generation:
          type: integer
          format: int64
          minimum: 0
        error_code:
          type: string
          maxLength: 128
        result:
          $ref: "#/components/schemas/ExecutorReportResultV4"
    ExecutorReportResult:
      type: object
      additionalProperties: false
      properties:
        runtime_ref:
          type: string
          maxLength: 1024
        error:
          type: string
          maxLength: 4096
        replayed:
          type: boolean
        absent:
          type: boolean
    ExecutorReportResultV4:
      type: object
      additionalProperties: false
      properties:
        runtime_ref:
          type: string
          maxLength: 1024
        error:
          type: string
          maxLength: 4096
        replayed:
          type: boolean
        absent:
          type: boolean
        admission:
          $ref: "#/components/schemas/ExecutorAdmissionProjectionV1"
        activation_canary:
