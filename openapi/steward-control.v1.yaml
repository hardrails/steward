openapi: 3.0.3
info:
  title: Steward Control API
  version: "1.0.0"
  description: |
    Public contract for Steward's optional, self-hosted fleet controller. The
    controller manages tenant scopes, operator credentials, one-time node
    enrollment, node inventory, bounded desired deployments, reclaimable
    delivery of signed Executor commands, independently witnessed Executor evidence heads, and
    authenticated read-only fleet operations views. The embedded React console
    can also courier one exact offline-signed command through the existing command
    endpoint; it does not create, edit, approve, or sign command authority. An
    optional authenticated Prometheus endpoint exposes only bounded aggregate
    metrics.

    `steward-control` is a desired-state and transport authority, not an
    execution boundary. Tenant and site private signing keys stay outside this
    service. An optional online controller key can act only inside a retained,
    tenant-signed delegation. The controller does not need a Docker socket and
    cannot weaken a node's local admission policy. Each node verifies the inner
    DSSE command and any delegation before acting; the outer delivery lease is
    unsigned and grants no execution authority.

    The built-in store is a bounded, single-writer durable store intended for
    one active controller process. A second process cannot open the same state
    directory. Remote listeners require TLS; plaintext is allowed only on a
    literal loopback address. Every request Host must match the literal loopback
    listener authority or an exact, non-wildcard DNS or IP SAN from the TLS leaf
    certificate at the listener port. A malformed or mismatched Host is rejected
    with 400 before route dispatch. Every JSON body and response is limited to
    1 MiB.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Steward
    url: https://github.com/hardrails/steward
servers:
  - url: http://127.0.0.1:8443
    description: Default loopback listener
security:
  - bearerAuth: []
tags:
  - name: console
    description: Unauthenticated, embedded React console assets. Fleet reads and exact signed-command submission still require an operator bearer through the existing operations and command APIs.
  - name: health
    description: Unauthenticated process and durable-state probes.
  - name: tenants
    description: Site and tenant scope administration.
  - name: operators
    description: Scoped operator credential issuance and revocation.
  - name: enrollment
    description: One-time node enrollment capabilities.
  - name: nodes
    description: Tenant-projected node inventory and site-wide revocation.
  - name: deployments
    description: Bounded desired agent state reconciled under tenant-signed controller delegation.
  - name: evidence
    description: Site-admin inspection and portable verification of independently witnessed Executor evidence.
  - name: commands
    description: Exact tenant-signed Executor command submission and status.
  - name: operations
    description: Authenticated read-only fleet summaries, inventories, and derived attention.
  - name: metrics
    description: Optional authenticated Prometheus exposition of bounded fleet aggregates.
  - name: executor-uplink
    description: Node-authenticated delivery leasing and terminal reports.
  - name: evidence-uplink
    description: Node-authenticated publication of signed, append-only Executor evidence checkpoints.
paths:
  /console:
    get:
      tags: [console]
      operationId: getControlConsoleIndex
      summary: Read the embedded operator console entry point
      description: |
        Returns the committed React entry point without redirecting. The request
        must not contain a query string. The page contains no fleet data or
        credential; its same-origin API reads require an operator bearer.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleIndex"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
    head:
      tags: [console]
      operationId: headControlConsoleIndex
      summary: Read embedded operator console entry-point metadata
      description: Returns the same headers as `GET /console` with no response body. Query strings are rejected.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleHead"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /console/:
    get:
      tags: [console]
      operationId: getControlConsoleIndexSlash
      summary: Read the embedded operator console entry point
      description: |
        Returns the same committed entry point as `GET /console`, without a
        redirect. The request must not contain a query string.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleIndex"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
    head:
      tags: [console]
      operationId: headControlConsoleIndexSlash
      summary: Read embedded operator console entry-point metadata
      description: Returns the same headers as `GET /console/` with no response body. Query strings are rejected.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleHead"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /console/icon.svg:
    get:
      tags: [console]
      operationId: getControlConsoleIcon
      summary: Read the embedded operator console icon
      description: Returns the committed SVG icon. Query strings are rejected.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleIcon"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
    head:
      tags: [console]
      operationId: headControlConsoleIcon
      summary: Read embedded operator console icon metadata
      description: Returns the same headers as `GET /console/icon.svg` with no response body. Query strings are rejected.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleHead"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /console/THIRD_PARTY_NOTICES.txt:
    get:
      tags: [console]
      operationId: getControlConsoleThirdPartyNotices
      summary: Read embedded operator console third-party notices
      description: Returns the committed dependency notice text. Query strings are rejected.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleNotices"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
    head:
      tags: [console]
      operationId: headControlConsoleThirdPartyNotices
      summary: Read embedded operator console notice metadata
      description: Returns the same headers as the notice `GET` with no response body. Query strings are rejected.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ConsoleHead"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /console/assets/{asset}:
    get:
      tags: [console]
      operationId: getControlConsoleAsset
      summary: Read one committed operator console script or stylesheet
      description: |
        Returns only an exact committed JavaScript or CSS basename. Source
        files, source maps, nested paths, dot-prefixed names, unknown assets,
        and other extensions return `404`. Query strings return `400`.
      security: []
      parameters:
        - $ref: "#/components/parameters/ConsoleAsset"
      responses:
        "200":
          $ref: "#/components/responses/ConsoleScriptOrStyle"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
    head:
      tags: [console]
      operationId: headControlConsoleAsset
      summary: Read committed operator console asset metadata
      description: |
        Returns the same headers as the matching asset `GET` with no response
        body. Invalid or unknown asset names return `404`; query strings return
        `400`.
      security: []
      parameters:
        - $ref: "#/components/parameters/ConsoleAsset"
      responses:
        "200":
          $ref: "#/components/responses/ConsoleHead"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/healthz:
    get:
      tags: [health]
      operationId: controlHealth
      summary: Check process liveness
      description: Confirms that the controller process is serving HTTP. It does not read durable state.
      security: []
      responses:
        "200":
          description: The process is serving HTTP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/readiness:
    get:
      tags: [health]
      operationId: controlReadiness
      summary: Check durable-state readiness
      description: Confirms that the already-open durable store is not poisoned by an earlier write failure.
      security: []
      responses:
        "200":
          description: Durable control state is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/tenants:
    get:
      tags: [tenants]
      operationId: listControlTenants
      summary: List visible tenants
      description: Site administrators see every tenant. A tenant operator sees only its tenant.
      parameters:
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Tenants sorted by tenant ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
    post:
      tags: [tenants]
      operationId: createControlTenant
      summary: Create a tenant
      description: Requires a site-administrator credential. Repeating the same tenant ID is idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: The tenant was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "200":
          description: The tenant already existed and was returned unchanged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/tenants/{tenant_id}:
    parameters:
      - $ref: "#/components/parameters/TenantID"
    get:
      tags: [tenants]
      operationId: getControlTenant
      summary: Get one visible tenant
      description: A tenant outside the caller's scope is indistinguishable from an unknown tenant.
      responses:
        "200":
          description: Tenant status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/operators:
    post:
      tags: [operators]
      operationId: issueControlOperator
      summary: Issue a scoped operator bearer
      description: |
        Requires a site-administrator credential. The returned token is shown
        once; the controller retains only a keyed digest. Store it in an
        owner-only file before discarding the response. `request_id` makes an
        interrupted issuance recoverable: an exact retry returns the same
        bearer, while changing the requested role or scope returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueOperatorRequest"
      responses:
        "201":
          description: A new operator bearer was issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedOperator"
        "200":
          description: An exact request-ID retry reproduced the retained operator bearer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedOperator"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/operators/{credential_id}:
    parameters:
      - $ref: "#/components/parameters/CredentialID"
    delete:
      tags: [operators]
      operationId: revokeControlOperator
      summary: Revoke an operator credential
      description: |
        Requires a site-administrator credential. Revocation is durable before
        this response. The controller returns 409 rather than revoke the last
        live site administrator.
      responses:
        "204":
          description: The credential was revoked. The response has no body.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/enrollments:
    post:
      tags: [enrollment]
      operationId: createControlEnrollment
      summary: Create a one-time node enrollment capability
      description: |
        A tenant operator may bind one node to its own tenant. A site
        administrator may bind a node to multiple tenants. The capability
        expires within 24 hours. An exact `request_id` retry by the same
        operator credential reproduces the bearer after an interrupted response;
        changing the node, tenant set, or lifetime returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentRequest"
      responses:
        "200":
          description: An exact issuance retry returned the retained enrollment capability.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "201":
          description: A new enrollment capability was issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/enroll:
    post:
      tags: [enrollment]
      operationId: exchangeControlEnrollment
      summary: Exchange a one-time enrollment capability
      security: []
      description: |
        Returns an Executor node credential. An exact retry with the same
        enrollment token, request ID, and receipt identity returns the same
        credential while the enrollment remains retained and unexpired. The
        evidence identity proof demonstrates possession of the Executor receipt
        private key and binds it to this controller, enrollment, node, stream,
        and epoch. A later credential rotation for the same node may present a
        fresh enrollment-bound proof only for the already pinned receipt
        identity. Reusing the token with another request ID, changing the pinned
        identity, or reusing a receipt key for another node returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeEnrollmentRequest"
      responses:
        "201":
          description: Node credential issued, or reproduced for an exact retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeCredential"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "410":
          $ref: "#/components/responses/EnrollmentExpired"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/node-credentials/{credential_id}:
    parameters:
      - name: credential_id
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Identifier128"
    delete:
      tags: [nodes]
      operationId: revokeControlNodeCredential
      summary: Revoke one node transport credential
      description: |
        Requires a site-administrator credential. This disables only the named
        node bearer so a replacement can be enrolled and verified before the
        old credential is revoked. It does not revoke the node or sibling
        credentials. An exact retry returns `revoked: false`.
      responses:
        "200":
          description: The credential is revoked or was already revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeCredentialRevocation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/nodes/{node_id}:
    parameters:
      - $ref: "#/components/parameters/NodeID"
    delete:
      tags: [nodes]
      operationId: revokeControlNode
      summary: Revoke a node and its retained capabilities
      description: Requires a site-administrator credential. Revocation disables all retained node credentials and enrollment capabilities atomically.
      responses:
        "200":
          description: Node revocation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeRevocation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/nodes/{node_id}/evidence:
    parameters:
      - $ref: "#/components/parameters/NodeID"
    get:
      tags: [evidence]
      operationId: inspectExecutorEvidence
      summary: Inspect one node's witnessed evidence state
      description: |
        Requires a site-administrator credential because the retained witness
        is a site-wide forensic view, not tenant-projected inventory. Returns
        the latest last-good checkpoint and any sticky rollback or
        equivocation finding, including the exact historical checkpoint
        against which the conflicting head was evaluated. Revoked nodes remain
        inspectable. A legacy node that predates receipt-key enrollment is
        returned as `unwitnessed` without an identity proof.
      responses:
        "200":
          description: Bounded online evidence inspection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutorEvidenceInspection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/nodes/{node_id}/evidence/export:
    parameters:
      - $ref: "#/components/parameters/NodeID"
    get:
      tags: [evidence]
      operationId: exportExecutorEvidence
      summary: Export a portable signed evidence checkpoint
      description: |
        Requires a site-administrator credential. Signs the enrolled receipt
        identity, latest last-good checkpoint, any sticky finding and its exact
        comparison checkpoint, and export time with the controller's dedicated
        evidence-witness key. The embedded public key is descriptive only; an
        offline verifier must use a witness public key obtained through an
        independent trusted channel. Legacy unwitnessed nodes return 409
        because they have no receipt identity to bind into a verifiable export.
        If three consecutive witness updates prevent the controller from
        linearizing a signed export, it returns 409 with `Retry-After`. A 409
        without that header is a retained-state conflict, such as an
        unwitnessed legacy node, and is not made retryable by this contract.
      responses:
        "200":
          description: Portable controller-witness-signed evidence export.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutorEvidenceExport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/nodes/{node_id}/evidence/captures:
    parameters:
      - $ref: "#/components/parameters/NodeID"
    post:
      tags: [evidence]
      operationId: armExecutorEvidenceCapture
      summary: Arm a bounded activation evidence capture
      description: |
        Requires a site-administrator credential. Reserves one bounded capture
        from the node's current witnessed head. Operators arm it before
        submitting the activation command; the capture proves controller
        observation after that baseline, not when the node generated a frame.
        One node can have only one active capture. The absolute
        expiry is derived once from `ttl_seconds`; an exact retry returns the
        retained capture without extending it. Capture failure never blocks
        ordinary evidence witnessing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceCaptureArmRequest"
      responses:
        "201":
          description: The capture was armed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceCapture"
        "200":
          description: An exact arm request already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceCapture"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"
