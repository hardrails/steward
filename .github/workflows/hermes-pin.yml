name: Hermes pin refresh

on:
  schedule:
    - cron: "17 9 * * 2"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: hermes-pin-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Propose latest stable Hermes release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve and verify latest stable release
        id: hermes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response=$(mktemp)
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            repos/NousResearch/hermes-agent/releases/latest >"$response"
          mapfile -t release < <(python3 -I - "$response" <<'PY'
          import json
          import pathlib
          import re
          import sys

          document = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          tag = document.get("tag_name")
          if (
              document.get("draft") is not False
              or document.get("prerelease") is not False
              or not isinstance(tag, str)
              or re.fullmatch(r"v[0-9]+(?:\.[0-9]+){2}", tag) is None
          ):
              raise SystemExit("latest Hermes release is not one stable vX.Y.Z tag")
          print(tag)
          PY
          )
          test "${#release[@]}" -eq 1
          tag=${release[0]}
          source=$(mktemp -d)
          git -c init.defaultBranch=main init -q "$source"
          git -C "$source" remote add origin https://github.com/NousResearch/hermes-agent.git
          git -C "$source" fetch -q --depth=1 origin "refs/tags/$tag:refs/tags/$tag"
          git -C "$source" checkout -q --detach "$tag"
          python3 -I scripts/update-hermes-pin.py --source-dir "$source" --release-tag "$tag"
          revision=$(git -C "$source" rev-parse HEAD)
          version=$(python3 -I - "$source/pyproject.toml" <<'PY'
          import pathlib
          import re
          import sys

          matches = re.findall(r'^version = "([0-9]+\.[0-9]+\.[0-9]+)"$', pathlib.Path(sys.argv[1]).read_text(), re.MULTILINE)
          if len(matches) != 1:
              raise SystemExit("Hermes package version is invalid")
          print(matches[0])
          PY
          )
          printf 'tag=%s\nrevision=%s\nversion=%s\n' "$tag" "$revision" "$version" >>"$GITHUB_OUTPUT"

      - name: Open qualification-gated update pull request
        env:
          GH_TOKEN: ${{ github.token }}
          HERMES_TAG: ${{ steps.hermes.outputs.tag }}
          HERMES_REVISION: ${{ steps.hermes.outputs.revision }}
          HERMES_VERSION: ${{ steps.hermes.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Hermes is already pinned to $HERMES_TAG ($HERMES_REVISION)."
            exit 0
          fi
          branch="automation/hermes-${HERMES_TAG#v}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch -c "$branch"
          git add -- \
            adapters/hermes-agent/adapter.json \
            adapters/hermes-agent/entrypoint.py \
            adapters/hermes-agent/license-inventory.json \
            adapters/hermes-agent/source-inputs.sha256 \
            docs/faq.md docs/guides/hermes-agent.md docs/llms.txt \
            docs/reference/release-artifacts.md \
            scripts/build-hermes-adapter.sh scripts/hermes-feasibility.sh
          git diff --cached --check
          git commit -m "Pin Hermes Agent $HERMES_TAG"
          git push --force-with-lease origin "$branch"
          gh workflow run ci.yml --ref "$branch"
          existing=$(gh pr list --head "$branch" --state open --json url --jq '.[0].url // ""')
          if [[ -n $existing ]]; then
            echo "Updated $existing"
            exit 0
          fi
          body=$(mktemp)
          printf '%s\n' \
            '## Hermes pin refresh' \
            '' \
            "- Upstream release: \`$HERMES_TAG\`" \
            "- Package version: \`$HERMES_VERSION\`" \
            "- Immutable commit: \`$HERMES_REVISION\`" \
            '' \
            'This PR updates the exact source and lockfile hashes only. It is intentionally not eligible to merge until the disposable-host gVisor feasibility run and signed Steward integration run regenerate evidence for these exact bytes.' \
            '' \
            'Do not bypass failing adapter-evidence checks.' >"$body"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Pin Hermes Agent $HERMES_TAG" \
            --body-file "$body"
