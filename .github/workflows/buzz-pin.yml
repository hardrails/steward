name: Buzz pin refresh

on:
  schedule:
    - cron: "41 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: buzz-pin-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Propose qualified Buzz source snapshot
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve an observed stable source snapshot
        id: buzz
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response=$(mktemp)
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            repos/block/buzz/releases/latest >"$response"
          mapfile -t release < <(python3 -I - "$response" <<'PY'
          import datetime
          import json
          import pathlib
          import re
          import sys

          document = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          tag = document.get("tag_name")
          published = document.get("published_at")
          if (
              document.get("draft") is not False
              or document.get("prerelease") is not False
              or not isinstance(tag, str)
              or re.fullmatch(r"v[0-9]+(?:\.[0-9]+){2}", tag) is None
              or not isinstance(published, str)
          ):
              raise SystemExit("latest Buzz release is not one stable desktop source snapshot")
          observed = datetime.datetime.fromisoformat(published.replace("Z", "+00:00"))
          now = datetime.datetime.now(datetime.timezone.utc)
          if now - observed < datetime.timedelta(hours=24):
              print("observing")
              print(tag)
              raise SystemExit(0)
          print("stable")
          print(tag)
          PY
          )
          test "${#release[@]}" -eq 2
          status=${release[0]}
          tag=${release[1]}
          if [[ $status == observing ]]; then
            echo "Buzz $tag is still completing its 24-hour observation window."
            printf 'stable=false\ntag=%s\n' "$tag" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          source=$(mktemp -d)
          git -c init.defaultBranch=main init -q "$source"
          git -C "$source" remote add origin https://github.com/block/buzz.git
          git -C "$source" fetch -q --depth=1 origin "refs/tags/$tag:refs/tags/$tag"
          git -C "$source" checkout -q --detach "$tag"
          python3 -I scripts/update-buzz-pin.py --source-dir "$source" --release-tag "$tag"
          revision=$(git -C "$source" rev-parse HEAD)
          printf 'stable=true\ntag=%s\nrevision=%s\n' "$tag" "$revision" >>"$GITHUB_OUTPUT"

      - name: Open qualification-gated update pull request
        if: steps.buzz.outputs.stable == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BUZZ_TAG: ${{ steps.buzz.outputs.tag }}
          BUZZ_REVISION: ${{ steps.buzz.outputs.revision }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Buzz is already pinned to $BUZZ_TAG ($BUZZ_REVISION)."
            exit 0
          fi
          existing=$(gh pr list --state open --search 'in:title Buzz source pin refresh' --json url --jq '.[0].url // ""')
          if [[ -n $existing ]]; then
            gh pr comment "$existing" --body "A newer candidate is available: \`$BUZZ_TAG\` at \`$BUZZ_REVISION\`. This workflow did not replace bytes already under review."
            exit 0
          fi
          branch="automation/buzz-${BUZZ_REVISION:0:12}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch -c "$branch"
          git add -- integrations/buzz/source-lock.json
          git diff --cached --check
          git commit -m "Pin Buzz source $BUZZ_TAG"
          git push origin "$branch"
          body=$(mktemp)
          printf '%s\n' \
            '## Buzz source pin refresh' \
            '' \
            "- Stable source snapshot: \`$BUZZ_TAG\`" \
            "- Immutable commit: \`$BUZZ_REVISION\`" \
            '' \
            'This PR changes source identity only. Buzz component package versions are not release identity because its desktop, relay, chart, and agent lanes advance independently.' \
            '' \
            'Do not merge until the frozen offline bridge build, license/SBOM/advisory review, malicious-relay suite, secret-isolation suite, restart/idempotency suite, and disposable-host gVisor qualification have regenerated evidence for these exact bytes.' >"$body"
          gh pr create --base main --head "$branch" --title "Buzz source pin refresh: $BUZZ_TAG" --body-file "$body"
