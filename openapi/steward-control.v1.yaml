  /v1/nodes/{node_id}/evidence/captures/{capture_id}/export:
    parameters:
      - $ref: "#/components/parameters/NodeID"
      - $ref: "#/components/parameters/CaptureID"
    get:
      tags: [evidence]
      operationId: exportExecutorEvidenceCapture
      summary: Export a sealed activation evidence range
      description: |
        Requires a site-administrator credential. Returns exact native
        Executor evidence frames for the complete witnessed report suffix. The
        suffix contains the matching activation begin followed by its checkpoint
        and can contain later unrelated frames before the signed final head. A
        purpose-separated controller-witness signature binds the complete suffix.
        Offline verification must use a witness public key obtained
        through an independent trusted channel. If three consecutive state
        changes prevent a linearized export, the controller returns 409 with
        `Retry-After`.
      responses:
